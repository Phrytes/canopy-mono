<!doctype html>
<!--
  Slice #252 (2026-05-27) — web parity surface for tasks-mobile's
  `ChatThreadScreen.jsx`. Renders a single 1:1 chat thread:
    - Reads `?threadId=…&counterparty=…&appealForTaskId=…` off the URL.
    - Lists messages oldest-first via `getChatThread`.
    - Sends via `sendChatMessage` (or `appealTask` when the thread is
      `appeal:<taskId>` and still empty — first-message-from-the-
      revoked-assignee path; mirrors mobile).

  Pure-JS glue (URL parsing, message normalisation, recipient pick,
  send-payload builder, short-webid, timestamp formatter) lives in
  `src/ui/chatThread.js`, served at `/lib/chatThread.js` by
  `bin/tasks-ui.js`. Shared verbatim with the mobile screen so the
  view-model drift can't happen.

  Locale keys live under `web.chat.*` in
  `apps/tasks-v0/locales/{en,nl}.json` (parallel to mobile's
  `mobile.chat.*` — kept separate because the mobile bundle is its
  own locale namespace today; merge under a `chat.*` root the day
  we wire the shared locales loader for web).
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title data-i18n="web.chat.page_title">Tasks — Chat</title>
  <link rel="stylesheet" href="/style.css">
  <!-- Post-V0 (#272, 2026-05-27) — runtime locale loader; reads ?lng= or localStorage. -->
  <script type="module" src="/lib/i18nAutoBoot.js"></script>
  <style>
    /* Slice #252 — chat-thread styles. Kept inline (page-local) so
       the global `style.css` stays focused on the task-list surface.
       The visual language echoes the mobile bubbles: own messages
       right-aligned with the accent fill; peer messages left-aligned
       with a card border. */
    .chat-shell      { max-width: 720px; margin: 0 auto; padding: 0.5rem; display: flex; flex-direction: column; height: calc(100vh - 6rem); }
    .chat-header     { padding: 0.6rem 0.8rem; border-bottom: 1px solid var(--border); }
    .chat-header .peer { font-weight: 600; font-size: 1rem; }
    .chat-header .tid  { font-size: 0.75rem; color: var(--muted); margin-top: 0.15rem; font-family: ui-monospace, monospace; }
    .chat-scroll     { flex: 1; overflow-y: auto; padding: 0.8rem 0.4rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .chat-bubble     { max-width: 80%; padding: 0.45rem 0.7rem; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-soft, var(--bg)); white-space: pre-wrap; word-break: break-word; }
    .chat-bubble.mine { align-self: flex-end; background: var(--accent, #1e88e5); color: #fff; border-color: transparent; }
    .chat-bubble .body  { font-size: 0.95rem; }
    .chat-bubble .meta  { font-size: 0.7rem; opacity: 0.8; margin-top: 0.25rem; }
    .chat-empty      { text-align: center; color: var(--muted); padding: 1.5rem 0.5rem; font-size: 0.9rem; }
    .chat-error      { color: var(--danger, #c0392b); padding: 0.4rem 0.8rem; font-size: 0.85rem; }
    .chat-compose    { display: flex; gap: 0.5rem; align-items: flex-end; padding: 0.6rem 0.4rem 0.2rem; border-top: 1px solid var(--border); }
    .chat-compose textarea { flex: 1; min-height: 38px; max-height: 160px; padding: 0.4rem 0.6rem; border: 1px solid var(--border); border-radius: 6px; font: inherit; resize: vertical; }
    .chat-no-thread  { padding: 2rem; color: var(--danger, #c0392b); }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/" data-i18n="nav.workspace">Workspace</a>
      <a href="/mine.html" data-i18n="nav.my_work">My work</a>
      <a href="/review.html" data-i18n="nav.review">Review</a>
      <a href="/dag.html" data-i18n="nav.dag">DAG</a>
      <a href="/availability.html">Availability</a>
      <a href="/crew.html" data-i18n="nav.crew">Crew</a>
      <a href="/crews.html">Crews</a>
      <a href="/inbox.html" id="nav-inbox" data-i18n="nav.inbox">Inbox</a>
    </nav>
    <div id="actor"></div>
  </header>

  <main>
    <section class="chat-shell" id="chat-shell">
      <div id="no-thread" class="chat-no-thread" data-i18n="web.chat.no_thread" hidden>
        No thread specified. Add <code>?threadId=…</code> to the URL.
      </div>

      <div id="chat" hidden>
        <div class="chat-header">
          <div class="peer" id="peer-label" data-i18n="web.chat.unknown_peer">(unknown peer)</div>
          <div class="tid" id="thread-id"></div>
        </div>

        <div class="chat-scroll" id="messages">
          <p class="chat-empty" id="empty-state" data-i18n="web.chat.loading">Loading…</p>
        </div>

        <div class="chat-error" id="send-error" hidden></div>

        <form class="chat-compose" id="compose-form">
          <textarea id="body-input"
                    rows="1"
                    aria-label="chat-input"
                    data-i18n-attr="placeholder:web.chat.input_placeholder"
                    placeholder="Write a message…"></textarea>
          <button type="submit"
                  id="send-btn"
                  aria-label="chat-send"
                  data-i18n="web.chat.send"
                  disabled>Send</button>
        </form>
      </div>
    </section>
  </main>

  <script type="module">
    /*
     * Slice #252 (2026-05-27) — web parity for the mobile
     * ChatThreadScreen. The page is intentionally thin:
     *   - URL parsing + recipient/appeal heuristics + payload builders
     *     come from /lib/chatThread.js (shared with mobile).
     *   - List refresh piggybacks on the existing mountLive() poll
     *     (the chat-p2p substrate writes chat-message items into the
     *     per-crew item-store, so item-added / item-removed cover
     *     inbound deliveries the same way the inbox/mine pages
     *     consume them).
     */
    import { callSkill, getActor, mountInboxBadge, mountLive, escapeHtml } from '/app.js';
    import {
      parseChatLocation,
      normaliseChatMessages,
      pickRecipient,
      shouldUseAppeal,
      buildSendArgs,
      buildAppealArgs,
      shortWebid,
      formatTimestamp,
      taskIdFromAppealThread,
    } from '/lib/chatThread.js';

    const $ = (id) => document.getElementById(id);

    document.getElementById('actor').textContent = await getActor();
    mountInboxBadge(document.getElementById('nav-inbox'));

    const route = parseChatLocation(new URLSearchParams(window.location.search));
    if (!route) {
      $('no-thread').hidden = false;
    } else {
      $('chat').hidden = false;
      $('thread-id').textContent = route.threadId;
      // The mobile screen falls back to deriving the appealForTaskId
      // from `appeal:<taskId>` thread ids; we mirror that so the
      // "open appeal" first-send path works even when the caller
      // didn't pass `appealForTaskId` explicitly.
      const appealForTaskId = route.appealForTaskId
        ?? taskIdFromAppealThread(route.threadId);

      // Resolve self webid from /tasks-config.json (mirrors how
      // app.js's getActor() reads the agent card; the local actor
      // is the configured "me").
      const selfWebid = await fetchSelfWebid();

      let messages    = [];
      let inFlight    = false;
      let busy        = false;

      async function refresh() {
        if (inFlight) return;
        inFlight = true;
        try {
          const r = await callSkill('getChatThread', { threadId: route.threadId });
          if (r?.error) {
            // Render an explicit error instead of perma-loading; the
            // chat-not-wired case (V0 mode without a crew envelope)
            // shows up here.
            renderError(r.error);
            messages = [];
            return;
          }
          messages = normaliseChatMessages(r?.messages);
          renderMessages();
        } catch (err) {
          renderError(err?.message ?? String(err));
        } finally {
          inFlight = false;
        }
      }

      function renderMessages() {
        const root = $('messages');
        root.innerHTML = '';
        if (messages.length === 0) {
          const p = document.createElement('p');
          p.className = 'chat-empty';
          // Mobile uses `mobile.chat.appeal_empty` when the thread
          // is an appeal-thread with no messages yet; we surface the
          // same hint so the user knows the first send opens the
          // appeal automatically.
          p.textContent = appealForTaskId
            ? localised('web.chat.appeal_empty', 'Send a message to open the appeal thread with the master.')
            : localised('web.chat.empty',        'No messages yet. Say hi.');
          root.appendChild(p);
        } else {
          for (const m of messages) {
            const div = document.createElement('div');
            const mine = m.from && m.from === selfWebid;
            div.className = `chat-bubble${mine ? ' mine' : ''}`;
            const fromTxt = m.from ? `@${shortWebid(m.from)}` : '';
            const tsTxt   = m.ts   ? formatTimestamp(m.ts)    : '';
            const sep     = fromTxt && tsTxt ? ' · ' : '';
            div.innerHTML =
              `<div class="body">${escapeHtml(m.body)}</div>` +
              `<div class="meta">${escapeHtml(fromTxt)}${escapeHtml(sep)}${escapeHtml(tsTxt)}</div>`;
            root.appendChild(div);
          }
        }
        // Recipient label updates as messages arrive (mobile does the
        // same — the heuristic picks the not-self party out of the
        // existing thread when the caller didn't pass `counterparty`).
        const recipient = pickRecipient(messages, {
          selfWebid,
          counterparty: route.counterparty,
        });
        $('peer-label').textContent = recipient
          ? `@${shortWebid(recipient)}`
          : localised('web.chat.unknown_peer', '(unknown peer)');
        // Scroll to bottom on render — newest-at-bottom is the same
        // ordering the substrate returns + the mobile FlatList uses.
        root.scrollTop = root.scrollHeight;
      }

      function renderError(msg) {
        const root = $('messages');
        root.innerHTML = '';
        const p = document.createElement('p');
        p.className = 'chat-empty';
        p.style.color = 'var(--danger, #c0392b)';
        p.textContent = `${localised('web.chat.load_failed', 'Could not load thread')}: ${msg}`;
        root.appendChild(p);
      }

      function flashSendError(msg) {
        const el = $('send-error');
        el.textContent = msg;
        el.hidden = false;
        clearTimeout(flashSendError._t);
        flashSendError._t = setTimeout(() => {
          el.hidden = true;
          el.textContent = '';
        }, 4000);
      }

      const bodyEl = $('body-input');
      const sendBtn = $('send-btn');
      bodyEl.addEventListener('input', () => {
        sendBtn.disabled = busy || bodyEl.value.trim().length === 0;
      });

      $('compose-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const text = bodyEl.value.trim();
        if (!text || busy) return;
        busy = true;
        sendBtn.disabled = true;
        sendBtn.textContent = localised('common.busy', 'Working…');
        try {
          const recipient = pickRecipient(messages, {
            selfWebid,
            counterparty: route.counterparty,
          });
          const useAppeal = shouldUseAppeal({
            appealForTaskId,
            messageCount: messages.length,
          });
          const args = useAppeal
            ? buildAppealArgs({ taskId: appealForTaskId, body: text })
            : buildSendArgs({ threadId: route.threadId, recipient, body: text });
          const r = await callSkill(useAppeal ? 'appealTask' : 'sendChatMessage', args);
          if (r?.error) {
            flashSendError(String(r.error));
            return;
          }
          bodyEl.value = '';
          await refresh();
        } catch (err) {
          flashSendError(err?.message ?? String(err));
        } finally {
          busy = false;
          sendBtn.textContent = localised('web.chat.send', 'Send');
          sendBtn.disabled = bodyEl.value.trim().length === 0;
        }
      });

      await refresh();
      // Same polling pattern inbox.html / mine.html use; the chat-p2p
      // substrate writes inbound chat-message items into the per-crew
      // item-store, so `item-added` covers peer deliveries.
      mountLive(['item-added', 'item-removed'], refresh);
    }

    /*
     * Slice #252 — minimal in-page localisation shim. The tasks-v0
     * web stack does NOT load locales/*.json at runtime today (the
     * `data-i18n` attributes ride as static English defaults; the
     * runtime loader is a future enhancement, see
     * `src/lib/localisation.js`'s docstring). We honour the
     * no-hardcoded-strings memory by:
     *   - declaring every visible string as a `data-i18n` key + an
     *     entry in `locales/{en,nl}.json` (web.chat.*),
     *   - threading dynamic strings through `localised(key, fallback)`
     *     so the back-fill is one find-and-replace away.
     * The fallback is the English copy; switching to the locale JSON
     * is a future PR that wires the loader once across all pages.
     */
    function localised(key, fallback) {
      // Window-scoped i18n hook for future overlay; today returns the
      // declared English fallback. Tests live in
      // `test/ui/chatThread.test.js` and exercise the pure helpers
      // directly — the rendering glue is intentionally trivial.
      const fn = typeof window !== 'undefined' && window.__i18n_t;
      if (typeof fn === 'function') {
        try { return fn(key) ?? fallback; } catch { return fallback; }
      }
      return fallback;
    }

    async function fetchSelfWebid() {
      try {
        const r = await fetch('/tasks-config.json');
        if (!r.ok) return null;
        const cfg = await r.json();
        return cfg?.actor ?? null;
      } catch {
        return null;
      }
    }
  </script>
</body>
</html>
