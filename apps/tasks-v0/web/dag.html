<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Tasks — DAG view</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="/">Workspace</a>
      <a href="/mine.html">My work</a>
      <a href="/review.html">Review</a>
      <a href="/dag.html" class="active">DAG</a>
      <a href="/availability.html">Availability</a>
      <a href="/crew.html">Crew</a>
      <a href="/crews.html">Crews</a>
      <a href="/inbox.html" id="nav-inbox">Inbox</a>
    </nav>
    <div id="actor"></div>
  </header>

  <main>
    <section id="dag">
      <h2 id="dag-title">Sub-task hierarchy</h2>
      <p style="font-size:0.85rem;color:var(--muted)">
        Read-only tree of every top-level task and its sub-tasks. Click
        a node to jump to its detail (V1.5 — currently logs the id).
      </p>
      <div id="trees"><p class="empty">Loading…</p></div>
    </section>
  </main>

  <script type="module">
    /*
     * Slice B.1 (PLAN-gui-chat-uplift.md, 2026-05-20) — first tasks-v0
     * web page driven by the manifest's NavModel via renderWeb.  The
     * DOM shell above is unchanged; the script below resolves the
     * `dag` section + its `getDagTree` op declaration off the
     * NavModel rather than hand-coding the dispatch.
     *
     * V0.2 (2026-05-20) — section data-fetch flows through the shared
     * `fetchSectionItems(section, {callSkill})` helper which honours
     * the manifest's Q7 `view.dataSource: {skillId: 'getDagTree'}`
     * declaration. The previous hard-coded `callSkill('getDagTree', {})`
     * was the load-bearing fallback path (no surfaces.ui ⇒ no
     * itemAction to pull the op id from); V0.2 collapses that into the
     * manifest.
     *
     * Discipline:
     *   - Fetch `/navmodel.json` + `/tasks-config.json` (mirrors the
     *     household-web pattern).
     *   - Look up the `dag` section in `navModel.sections[]`; abort
     *     gracefully if the manifest drifted (the page renders a
     *     "DAG view unavailable" panel via the existing
     *     `renderV1NotAvailable` helper).
     *   - Call the section's declared `dataSource.skillId` via the
     *     shared `fetchSectionItems` (V0.2 helper, Q7).
     *   - Flatten the response through `flattenDagTree` (the shared
     *     UI-helper used by tasks-mobile's DagScreen too — per
     *     `docs/web-mobile-parity-workarounds.md` §A.4).
     *   - Render a tree (parent → indented children) preserving
     *     byte-identical row markup against the pre-B.1 version.
     */
    import {
      callSkill, getActor, mountLive, mountInboxBadge,
      lifecycleStatus, escapeHtml, renderV1NotAvailable,
    } from '/app.js';
    // Shared with tasks-mobile (per docs/web-mobile-parity-workarounds.md
    // §A.4); the CLI bootstrap (`bin/tasks-ui.js`) overlays this file at
    // `/lib/dagFlatten.js` via `extraStaticFiles` — source-of-truth is
    // `apps/tasks-v0/src/ui/dagFlatten.js`.
    import { flattenDagTree } from '/lib/dagFlatten.js';
    // V0.2 (2026-05-20) — section data-fetch through the manifest's
    // Q7 view.dataSource declaration.
    import { fetchSectionItems } from '/lib/web-adapter/fetchSectionItems.js';

    document.getElementById('actor').textContent = await getActor();
    mountInboxBadge(document.getElementById('nav-inbox'));

    // Load NavModel (manifest projection) + tasks-config (actor/role)
    // via the bootstrap-injected extraStaticFiles.  Both are static
    // for the life of the server.
    const [navModel, _config] = await Promise.all([
      fetch('/navmodel.json').then((r) => r.json()).catch(() => null),
      fetch('/tasks-config.json').then((r) => r.json()).catch(() => ({})),
    ]);

    // Locate the `dag` section.  When the manifest drifts (section
    // dropped/renamed), surface a friendly panel rather than throwing.
    const dagSection = navModel?.sections?.find((s) => s.id === 'dag');
    if (!dagSection) {
      renderV1NotAvailable(
        document.getElementById('trees'),
        new Error('manifest has no "dag" section'),
        'DAG view is a V1 feature.',
      );
    } else {
      // Mirror the section title onto the H2 so the manifest stays
      // the source of truth for user-visible label.
      document.getElementById('dag-title').textContent = dagSection.title;
    }

    function statusOf(item) {
      const life = lifecycleStatus(item);
      if (life === 'open' || life === 'claimed') return item.status ?? 'ready';
      return life;
    }

    /**
     * Build the row markup for one task.  Pulled out of the recursive
     * `renderNode` so flat-list rendering (depth-first, via
     * `flattenDagTree`) and a future nested layout can share the
     * same row shape.  Returns the row's <div class="label">; the
     * caller positions it.
     */
    function renderLabel(task) {
      const label = document.createElement('div');
      label.className = 'label';
      label.innerHTML = `
        <span class="text">${escapeHtml(task.text ?? '')}</span>
        <span class="status pill">${escapeHtml(statusOf(task))}</span>`;
      label.addEventListener('click', () => {
        // V1.5 will route to the task detail modal; for now log the id.
        console.log('clicked task', task.id);
      });
      return label;
    }

    function renderNode(node) {
      // `node` shape from `getDagTree`: `{id, item, children}` (the
      // substrate's `treeOf` emit).  `flattenDagTree` re-shapes these
      // into `{task, depth}` rows — but the existing snapshot kept a
      // recursive nested DOM, so we preserve that exact layout here
      // while delegating row markup to `renderLabel`.
      const div = document.createElement('div');
      div.className = `tree-node status-${statusOf(node.item)}`;
      div.dataset.id = node.item.id;
      div.appendChild(renderLabel(node.item));

      if (Array.isArray(node.children) && node.children.length > 0) {
        const wrap = document.createElement('div');
        wrap.className = 'tree-children';
        for (const c of node.children) wrap.appendChild(renderNode(c));
        div.appendChild(wrap);
      }
      return div;
    }

    async function refresh() {
      if (!dagSection) return;
      try {
        // V0.2 (Q7): `dagSection.dataSource = {skillId: 'getDagTree'}`
        // declared in the manifest. `fetchSectionItems` reads that and
        // dispatches the skill call through the supplied `callSkill`.
        // Pre-V0.2 this page hard-coded the skill id because no
        // itemAction surfaces `getDagTree` (no surfaces.ui in the
        // manifest); the helper now lifts that into a substrate
        // contract shared with mine.html + future renderMobile.
        const r = await fetchSectionItems(dagSection, { callSkill });
        // Sanity-check the response via the shared `flattenDagTree`
        // helper (handles `{trees}` | `{tree}` | bare-node shapes).
        // Empty forest → render the empty-state message; otherwise
        // walk the nested forest as before.  Both paths use
        // `flattenDagTree` to validate the response shape even when
        // the visual layout stays nested.
        const flat = flattenDagTree(r);
        const root = document.getElementById('trees');
        root.innerHTML = '';
        if (flat.length === 0) {
          root.innerHTML = '<p class="empty">No tasks yet.</p>';
          return;
        }
        const trees = Array.isArray(r?.trees) ? r.trees : (r?.tree ? [r.tree] : []);
        for (const t of trees) root.appendChild(renderNode(t));
      } catch (err) {
        renderV1NotAvailable(
          document.getElementById('trees'),
          err,
          'DAG view is a V1 feature.',
        );
      }
    }

    await refresh();
    mountLive([
      'item-added', 'item-completed', 'item-removed', 'item-claimed',
      'item-submitted', 'item-rejected', 'item-revoked',
    ], refresh);
  </script>
</body>
</html>
