<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Basis — Onderling</title>
    <!-- Bulletin design (2026-07): system fonts only — the Google-Fonts
         Source Serif download is gone with the linen theme (theme-linen.js). -->
    <link rel="stylesheet" href="./v2/theme.css" />
    <!-- theme pre-paint: apply a saved light/dark choice before first render;
         without a choice (or without JS) the OS preference decides. -->
    <script>try{var _t=localStorage.getItem('basis.theme');if(_t==='dark'||_t==='light')document.documentElement.dataset.theme=_t}catch(e){}</script>
    <link rel="stylesheet" href="./v2/circle.css" />
    <!-- SP-13.2.1 — nkn-sdk CDN.  circleApp.js bootstraps NKN at boot
         so kring chat-messages can fan out to peers.  Same script the
         classic-shell page used.  Failures fall through gracefully —
         the kring view still works locally without a peer transport. -->
    <script
      src="https://cdn.jsdelivr.net/npm/nkn-sdk@1.3.4/dist/nkn.min.js"
      onload="window.__cc_nkn_loaded = true;"
      onerror="window.__cc_nkn_load_error = 'CDN load failed';"></script>
  </head>
  <body>
    <div class="circle-page">
      <!-- SP-13.1 — no "← classic chat shell" link.  v2 §1: chat IS the
           kring view, not a separate shell. -->
      <div id="circle-root"></div>
    </div>
    <nav id="circle-tabbar" class="circle-tabbar circle-tabbar--hidden"></nav>
    <!-- Objective D / Surface 4 (#180) — docked side-panel host for manifest ops
         that declare `surfaces.page` (openPagePanel, src/web/pagePanel.js).  Hidden
         until a control opens it; the module toggles `hidden`. -->
    <aside id="page-panel" class="cc-page-panel" hidden></aside>
    <script type="module" src="./v2/circleApp.js"></script>
  </body>
</html>
