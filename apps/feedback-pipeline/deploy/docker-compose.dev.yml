# Local test on a laptop — no VPS / DNS / TLS. Runs the two Docker-friendly services on
# localhost; you run the activation service + bots as host `node` processes against
# http://localhost:3000 (keeping one consistent hostname, so Solid's absolute URIs line up).
#
#   PRIVATEMODE_API_KEY=<key> docker compose -f deploy/docker-compose.dev.yml up -d
#
# Then follow the runbook "Local test on a laptop" section. Caddy is intentionally absent
# (TLS is only for public hostnames).
services:
  css:
    image: solidproject/community-server:7.1.9@sha256:47260bc766cc11da881ca037e2ea672f853344c232577597a1fcbbceac76c3ef
    command: ["-c", "@css:config/file-acp.json", "-f", "/data", "-b", "http://localhost:3000/", "-p", "3000"]
    ports: ["3000:3000"]
    volumes: ["css-dev:/data"]
    restart: unless-stopped

  privatemode-proxy:
    image: ghcr.io/edgelesssys/privatemode/privatemode-proxy:latest@sha256:f4283c1cb64fbdd25f17df930ff9c2114b07cfb463c239afb1b639fb228d6988
    command: ["--apiKey", "${PRIVATEMODE_API_KEY}"]
    ports: ["8080:8080"]
    restart: unless-stopped

volumes:
  css-dev: {}
