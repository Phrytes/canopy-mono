<!doctype html>
<!--
  Tier: 1 — substrate-rendered.  (See DESIGN-tier-policy.md.)
  Manifest section: `mine` in apps/stoop/manifest.js.
  Rendering: section + per-row actions come from
    `renderWeb(stoopManifest)` via /navmodel.json.  Hand-coded only
    where the row card needs item-type-specific layout (ask/offer/lend).
-->
<!--
  mine.html — Slice E.1 (PLAN-gui-chat-uplift.md).
  V0.2-adopt (2026-05-21) — refactored to consume the NavModel V0.2
  substrate: `view.dataSource` (Q7) + `appliesTo.type: '*'` (Q8) +
  shared `@canopy/web-adapter` helpers (`fetchSectionItems`,
  `itemMatchesAppliesTo`).

  First stoop web page consuming `renderWeb(stoopManifest)`.  The page
  fetches `/navmodel.json` (served by `apps/stoop/bin/stoop-web.js`'s
  `extraStaticFiles`) and uses the NavModel's `mine` section to drive
  the heading + the data-source + the per-row action buttons.  The
  remaining 15 stoop pages stay hand-built and will land in follow-on
  E.x slices.

  Substrate sources of truth (V0.2):
    - `section.title`         → drives the <h2> text.
    - `section.dataSource`    → `fetchSectionItems` honours the Q7
                                 declaration (`listMyRequests({})`),
                                 removing the previous client special-
                                 case ("if section.id === 'mine' then
                                 listMyRequests").  The `mine` view's
                                 declared `itemType: 'request'` is now
                                 a placeholder used only by the section
                                 schema; the actual data spans ALL post
                                 types (ask/offer/lend).
    - `section.itemActions[]` → per-row buttons.  After the V0.2 Q8
                                 wildcard, `cancelRequest` (with
                                 `appliesTo: {type: '*'}`) surfaces as
                                 an itemAction on every section.  The
                                 button is rendered iff
                                 `itemMatchesAppliesTo` accepts the
                                 item (special-cased here for the '*'
                                 wildcard — see substrate gap note).

  Page falls back to the V0 hand-built behaviour when the NavModel
  isn't reachable (legacy launchers `stoop-ui.js` / `stoop-testbed.js`
  don't serve `/navmodel.json`) — keeps every existing launcher happy
  while still proving the NavModel path when served by `stoop-web.js`.

  ──── V0.2 substrate gaps observed (logged for follow-on slices) ────
    1. `itemMatchesAppliesTo` (in `@canopy/web-adapter`) does NOT
       understand `appliesTo.type === '*'` — its strict
       `types.includes(item.type)` check rejects every real item when
       the gate is a literal '*'.  This page special-cases the
       wildcard at the call site (see `actionAppliesToItem` below);
       a substrate fix would let every consumer share the same gate.
    2. `markReturned` (`appliesTo.type: 'lend'`) does NOT surface in
       the `mine` section's `itemActions[]` because the section's
       declared `itemType` is `'request'` (not `'lend'`).  This is
       structural: the section is a *predicate* over items, not a
       single type.  We render the markReturned button by reading
       it from the MANIFEST's `markReturned` op directly (the
       NavModel doesn't expose ops outside `itemActions[]` for the
       section).  Logged as a Q?-style follow-on signal — a future
       substrate addition (e.g. `view.itemTypes: string[]`) would
       let `mine` declare it spans ask/offer/lend and pick up
       markReturned via Q8 wildcard machinery.
-->
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title data-i18n="mine.page_title">Stoop — Mijn posts</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="/"               data-i18n="nav.feed">Buurt</a>
      <a href="/mine.html" class="active" data-i18n="nav.my_posts">Mijn posts</a>
      <a href="/chat.html"      data-i18n="nav.chat">Chat</a>
      <a href="/contacts.html"  data-i18n="nav.contacts">Contacten</a>
      <a href="/metrics.html"   data-i18n="nav.metrics">Metrics</a>
      <a href="/profile.html"   data-i18n="nav.profile">Profiel</a>
      <a href="/sign-in.html"   data-i18n="nav.pod">Pod</a>
      <a href="/push.html"      data-i18n="nav.push">Push</a>
      <a href="/onboard.html"   data-i18n="nav.onboard">Onboarden</a>
      <a href="/settings.html"  data-i18n="nav.settings">Instellingen</a>
    </nav>
    <select id="group-switcher" hidden aria-label="Switch group"></select>
    <div id="actor"></div>
  </header>

  <main>
    <!-- The `data-navmodel-section` attribute marks the section as
         NavModel-driven (Slice E.1).  When the NavModel is reachable,
         the inline script overwrites the heading text with
         `section.title`, fetches items via `fetchSectionItems`
         (honours `section.dataSource`), and renders per-row buttons
         from `section.itemActions[]`.  When not, the legacy hand-built
         behaviour takes over (V0 fallback). -->
    <section id="mine" data-navmodel-section="mine">
      <h2 id="mine-heading" data-i18n="mine.heading">Mijn posts</h2>
      <ul id="mine-list"><li class="empty" data-i18n="common.loading">Aan het laden…</li></ul>
    </section>
  </main>

  <script type="module">
    import { callSkill, getActor, mountLive, mountGroupSwitcher, initI18n, applyI18n, t } from '/app.js';
    // V0.2 (2026-05-21) — shared @canopy/web-adapter helpers.  Overlaid
    // at `/lib/web-adapter/*.js` by `bin/stoop-web.js`'s extraStaticFiles
    // (same mechanism tasks-v0 uses).  Source-of-truth lives in
    // `packages/web-adapter/src/`.
    import { fetchSectionItems }     from '/lib/web-adapter/fetchSectionItems.js';
    import { itemMatchesAppliesTo }  from '/lib/web-adapter/itemMatchesAppliesTo.js';

    await initI18n();
    applyI18n();
    document.title = t('mine.page_title', 'Stoop — My posts');

    document.getElementById('actor').textContent = await getActor();
    mountGroupSwitcher(document.getElementById('group-switcher'));

    // ── V0.2: consume the NavModel ───────────────────────────────────
    // Fetch `/navmodel.json` (served by `apps/stoop/bin/stoop-web.js`'s
    // `extraStaticFiles`).  When reachable, drive the heading from
    // `section.title` + the data-fetch from `section.dataSource` +
    // the per-row buttons from `section.itemActions[]`; when not,
    // fall back to the V0 hand-built behaviour.
    let navSection = null;
    try {
      const res = await fetch('/navmodel.json');
      if (res.ok) {
        const nav = await res.json();
        navSection = (nav?.sections ?? []).find((s) => s.id === 'mine') ?? null;
        if (navSection?.title) {
          document.getElementById('mine-heading').textContent = navSection.title;
        }
      }
    } catch { /* legacy launcher: no /navmodel.json — fall through */ }

    /**
     * V0.2 gap workaround — `itemMatchesAppliesTo` doesn't understand
     * `appliesTo.type === '*'` (Q8 wildcard).  Special-case the
     * wildcard here so a wildcard op (like cancelRequest) matches
     * every item; otherwise defer to the shared helper.
     */
    function actionAppliesToItem(action, item) {
      const t = action?.appliesTo?.type;
      if (t === '*' || (Array.isArray(t) && t.includes('*'))) {
        // Wildcard: type-agnostic; still honour appliesTo.state if set.
        if (action.appliesTo.state === undefined) return true;
        return itemMatchesAppliesTo({ state: action.appliesTo.state }, item);
      }
      return itemMatchesAppliesTo(action?.appliesTo, item);
    }

    /**
     * Render a single item row from the manifest's itemActions[].  The
     * cancel button comes from the `cancelRequest` itemAction (Q8
     * wildcard).  The mark-returned button is read off the MANIFEST
     * directly (see gap #2 in the file-level comment) — a future
     * substrate addition would surface it via itemActions[] too.
     */
    function renderItemFromNavModel(ul, item, section, opts) {
      const li = document.createElement('li');
      li.className = 'item';

      const actions = document.createElement('div');
      actions.className = 'actions';

      // V0.2 — per-row buttons from section.itemActions[].
      for (const action of section.itemActions ?? []) {
        if (!actionAppliesToItem(action, item)) continue;
        const btn = document.createElement('button');
        btn.textContent = action.label;
        // Wire by opId so we stay agnostic to the manifest's surface
        // labels (the manifest's `surfaces.ui.label` is the source of
        // truth for label text; the dispatch is by opId).
        btn.addEventListener('click', () => opts.onAction(action.opId, item));
        actions.appendChild(btn);
      }

      // Parity with stoop-mobile ItemDetailScreen: an open lend can be
      // marked returned by its author.  See gap #2 — markReturned
      // doesn't surface via itemActions[] because the section's
      // itemType is 'request', not 'lend'.  We render it manually here
      // until a future substrate slice (multi-type sections) closes
      // the gap.
      if (item.kind === 'lend' && !item.completedAt && typeof opts.onMarkReturned === 'function') {
        const ret = document.createElement('button');
        ret.className = 'ghost';
        ret.textContent = t('mine.mark_returned', 'Markeer als teruggebracht');
        ret.addEventListener('click', () => opts.onMarkReturned(item.id));
        actions.appendChild(ret);
      }

      li.innerHTML = `
        <div class="text">${escapeHtml(item.text ?? '')}</div>
        <div class="meta">
          ${(item.requiredSkills ?? []).map((s) => `<span class="skill">${escapeHtml(s)}</span>`).join('')}
          <span class="ts">${new Date(item.addedAt ?? Date.now()).toLocaleString()}</span>
        </div>`;
      li.appendChild(actions);
      ul.appendChild(li);
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    /**
     * Dispatch an itemAction by opId.  Currently only `cancelRequest`
     * surfaces here (Q8 wildcard); adding new wildcard ops just
     * extends this switch (or a lookup map).
     */
    async function dispatchItemAction(opId, item) {
      if (opId === 'cancelRequest') {
        // V0.2 — `cancelRequest` has `appliesTo: {type: '*'}` and
        // surfaces as an itemAction in EVERY section (renderWeb's Q8
        // rule).  Dispatched here off the section.itemActions[] entry.
        await callSkill('cancelRequest', { requestId: item.id });
        await refresh();
        return;
      }
      // Forward-compat: other wildcard / type-matched item ops would
      // dispatch here.  Unknown opIds are a manifest drift signal.
      console.warn(`mine.html: unknown itemAction opId "${opId}"`);
    }

    async function refresh() {
      const ul = document.getElementById('mine-list');
      // V0.2 — `fetchSectionItems` honours `section.dataSource`
      // (Q7).  For `mine`, the manifest declares
      // `dataSource: {skillId: 'listMyRequests'}` so this dispatches
      // `callSkill('listMyRequests', {})` — replacing the prior
      // hard-coded special-case at this site.  When NavModel isn't
      // reachable (legacy launcher), fall back to the same skill
      // call directly so the page still works.
      let result;
      if (navSection) {
        result = await fetchSectionItems(navSection, { callSkill });
      } else {
        // Fallback path: pre-V0.2 behaviour for legacy launchers
        // that don't serve /navmodel.json.  Calls listMyRequests
        // directly with the same arguments fetchSectionItems would
        // produce given a dataSource declaration.
        result = await callSkill('listMyRequests', {});
      }
      const items = result.items ?? [];
      ul.innerHTML = '';
      if (items.length === 0) {
        ul.innerHTML = '<li class="empty">You haven\'t posted any open requests.</li>';
        return;
      }
      // When NavModel is reachable, render from itemActions[]; when
      // not, render the legacy hard-coded Cancel button (V0 fallback).
      if (navSection) {
        for (const item of items) {
          renderItemFromNavModel(ul, item, navSection, {
            onAction: dispatchItemAction,
            onMarkReturned: async (requestId) => {
              // markReturned has `appliesTo.type: 'lend'` — see gap #2.
              await callSkill('markReturned', { requestId });
              await refresh();
            },
          });
        }
      } else {
        // V0 fallback: render with a hard-coded Cancel + optional
        // markReturned button (matches the pre-V0.2 renderMyItems
        // behaviour byte-for-byte).
        for (const item of items) {
          renderItemFromNavModel(ul, item, { itemActions: [] }, {
            onAction: dispatchItemAction,
            onMarkReturned: async (requestId) => {
              await callSkill('markReturned', { requestId });
              await refresh();
            },
          });
          // Legacy Cancel button (no NavModel — no itemActions[]).
          const li     = ul.lastElementChild;
          const acts   = li.querySelector('.actions');
          const cancel = document.createElement('button');
          cancel.textContent = 'Cancel';
          cancel.addEventListener('click', () => dispatchItemAction('cancelRequest', item));
          acts.insertBefore(cancel, acts.firstChild);
        }
      }
    }
    await refresh();

    mountLive(['item-added', 'item-completed', 'item-removed', 'item-claimed'], refresh);
  </script>
</body>
</html>
