<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title data-i18n="mine.page_title">Stoop — Mijn posts</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="/"               data-i18n="nav.feed">Buurt</a>
      <a href="/mine.html" class="active" data-i18n="nav.my_posts">Mijn posts</a>
      <a href="/chat.html"      data-i18n="nav.chat">Chat</a>
      <a href="/contacts.html"  data-i18n="nav.contacts">Contacten</a>
      <a href="/metrics.html"   data-i18n="nav.metrics">Metrics</a>
      <a href="/profile.html"   data-i18n="nav.profile">Profiel</a>
      <a href="/sign-in.html"   data-i18n="nav.pod">Pod</a>
      <a href="/push.html"      data-i18n="nav.push">Push</a>
      <a href="/onboard.html"   data-i18n="nav.onboard">Onboarden</a>
      <a href="/settings.html"  data-i18n="nav.settings">Instellingen</a>
    </nav>
    <select id="group-switcher" hidden aria-label="Switch group"></select>
    <div id="actor"></div>
  </header>

  <main>
    <section id="mine">
      <h2 data-i18n="mine.heading">Mijn posts</h2>
      <ul id="mine-list"><li class="empty" data-i18n="common.loading">Aan het laden…</li></ul>
    </section>
  </main>

  <script type="module">
    import { callSkill, renderMyItems, getActor, mountLive, mountGroupSwitcher, initI18n, applyI18n, t } from '/app.js';

    await initI18n();
    applyI18n();
    document.title = t('mine.page_title', 'Stoop — My posts');

    document.getElementById('actor').textContent = await getActor();
    mountGroupSwitcher(document.getElementById('group-switcher'));

    async function refresh() {
      const result = await callSkill('listMyRequests', {});
      renderMyItems(document.getElementById('mine-list'), result.items ?? [], {
        onAccept: async (requestId, responderWebid) => {
          await callSkill('acceptResponder', { requestId, responderWebid });
          await refresh();
        },
        onCancel: async (requestId) => {
          await callSkill('cancelRequest', { requestId });
          await refresh();
        },
      });
    }
    await refresh();

    mountLive(['item-added', 'item-completed', 'item-removed', 'item-claimed'], refresh);
  </script>
</body>
</html>
