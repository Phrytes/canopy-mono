<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title data-i18n="auth_callback.page_title">Stoop — Pod-aanmelding voltooien</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .progress-wrap {
      margin-top: 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      height: 12px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: var(--accent, #4a90e2);
      transition: width 200ms ease-out;
    }
    .progress-line { font-size: 0.85rem; color: var(--muted); margin-top: 0.5rem; }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/"            data-i18n="nav.feed">Buurt</a>
      <a href="/sign-in.html" data-i18n="nav.pod">Pod</a>
    </nav>
  </header>

  <main>
    <section>
      <h2 data-i18n="auth_callback.heading">Pod-aanmelding voltooien</h2>
      <div id="result" style="background: var(--bg-soft); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem;">
        <div id="status-line" data-i18n="auth_callback.busy">Bezig met afronden van de OIDC-flow…</div>
        <div id="progress" hidden>
          <div class="progress-wrap"><div id="progress-bar" class="progress-bar"></div></div>
          <div id="progress-line" class="progress-line"></div>
        </div>
      </div>
      <p style="margin-top: 1rem;">
        <a href="/sign-in.html" data-i18n="auth_callback.back_link">Terug naar pod-instellingen →</a>
      </p>
    </section>
  </main>

  <script type="module">
    import { callSkill, initI18n, applyI18n, t } from '/app.js';

    await initI18n();
    applyI18n();
    document.title = t('auth_callback.page_title', 'Stoop — Completing pod sign-in');

    const out          = document.getElementById('result');
    const statusLine   = document.getElementById('status-line');
    const progressBox  = document.getElementById('progress');
    const progressBar  = document.getElementById('progress-bar');
    const progressLine = document.getElementById('progress-line');
    const callbackUrl  = location.href;

    // Start a poller that watches getBulkSyncStatus.  It fires every
    // 200ms once the bulk-sync becomes 'running' and stops when the
    // skill returns or the phase goes terminal.
    let polling = true;
    async function pollProgress() {
      while (polling) {
        try {
          const r = await callSkill('getBulkSyncStatus', {});
          const s = r?.bulkSync;
          if (s && s.phase === 'running' && s.total > 0) {
            progressBox.hidden = false;
            const pct = Math.min(100, Math.round((s.done / s.total) * 100));
            progressBar.style.width = pct + '%';
            progressLine.textContent = t('auth_callback.progress', 'Uploading {done} of {total}…')
              .replace('{done}', s.done).replace('{total}', s.total);
            statusLine.textContent = t('auth_callback.uploading', 'Uploading your local data to your pod…');
          } else if (s && (s.phase === 'finished' || s.phase === 'error')) {
            // Terminal — let the main flow finish; loop exits below.
          }
        } catch { /* ignore polling errors */ }
        await new Promise((res) => setTimeout(res, 200));
      }
    }
    pollProgress();

    try {
      const r = await callSkill('completePodSignIn', { callbackUrl });
      polling = false;
      if (r.ok) {
        out.innerHTML = '';
        const ok = document.createElement('div');
        ok.innerHTML = t('auth_callback.signed_in_html',
          'Aangemeld als <strong>{webid}</strong>. Pod gekoppeld op <code>{podRoot}</code>.')
          .replace('{webid}',   r.webid)
          .replace('{podRoot}', r.podRoot);
        out.appendChild(ok);
        // Show one-line bulk-sync summary when it finished cleanly.
        const finalStatus = await callSkill('getBulkSyncStatus', {});
        const fs = finalStatus?.bulkSync;
        if (fs?.phase === 'finished' && fs.done > 0) {
          const summary = document.createElement('div');
          summary.className = 'progress-line';
          summary.textContent = t('auth_callback.synced_summary',
            '{count} entries uploaded to your pod.')
            .replace('{count}', fs.done);
          out.appendChild(summary);
        } else if (fs?.phase === 'error') {
          const warn = document.createElement('div');
          warn.className = 'progress-line';
          warn.textContent = t('auth_callback.sync_partial',
            'Sign-in succeeded; some local data could not upload yet — Stoop will retry in the background.');
          out.appendChild(warn);
        }
        setTimeout(() => { location.href = '/sign-in.html'; }, 1800);
      } else {
        out.innerHTML = `${t('common.error', 'Error')}: ${r.error}`;
      }
    } catch (err) {
      polling = false;
      out.innerHTML = `${t('common.error', 'Error')}: ${err.message ?? err}`;
    }
  </script>
</body>
</html>
