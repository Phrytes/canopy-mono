<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>Stoop — Chat</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="/">Buurt</a>
      <a href="/mine.html">Mijn posts</a>
      <a href="/chat.html" class="active">Chat</a>
      <a href="/contacts.html">Contacten</a>
      <a href="/metrics.html">Metrics</a>
      <a href="/profile.html">Profiel</a>
      <a href="/sign-in.html">Pod</a>
      <a href="/push.html">Push</a>
      <a href="/onboard.html">Onboarden</a>
      <a href="/settings.html">Instellingen</a>
    </nav>
    <select id="group-switcher" hidden aria-label="Switch group"></select>
    <div id="actor"></div>
  </header>

  <main>
    <section id="thread-section" hidden>
      <div style="display: flex; align-items: baseline; justify-content: space-between; gap: 1rem;">
        <h2 id="thread-title">Gesprek</h2>
        <button id="reveal-btn" class="ghost">Connectie accepteren</button>
      </div>
      <div id="thread" class="chat-thread">
        <div class="chat-empty">Nog geen berichten.</div>
      </div>
      <form id="chat-form" class="chat-form">
        <input id="chat-input" type="text" placeholder="Schrijf je bericht…" autocomplete="off">
        <label class="chat-pic-label" title="Foto bijvoegen" data-i18n="chat.attach_picture" data-i18n-attr="title">
          <input id="chat-picture" type="file" accept="image/*" capture="environment" hidden>
          <span aria-hidden="true">📷</span>
        </label>
        <button type="submit">Stuur</button>
      </form>
      <div id="chat-pic-preview" class="picker-preview"></div>
      <span id="chat-pic-status" class="hint"></span>
    </section>

    <section id="threads-section">
      <h2>Mijn gesprekken</h2>
      <ul id="thread-list" style="list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 0.5rem;">
        <li class="empty" style="color: var(--muted); font-style: italic; padding: 1rem; text-align: center; background: var(--bg-soft); border-radius: var(--radius);">Nog geen gesprekken.</li>
      </ul>
    </section>
  </main>

  <script type="module">
    import { callSkill, getActor, mountGroupSwitcher, mountNotifyBanner, initLocalisation, applyLocalisation, t, renderAttachmentThumbs, openAttachmentModal } from '/app.js';
    import { resizeImage, CHAT_PRESET } from '/lib/imageResize.js';

    await initLocalisation();
    applyLocalisation();

    document.getElementById('actor').textContent = await getActor();
    mountGroupSwitcher(document.getElementById('group-switcher'));
    mountNotifyBanner();

    const myActor = await getActor();
    const params  = new URLSearchParams(location.search);
    const threadId = params.get('thread');

    function escapeHtml(s) {
      return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    if (threadId) {
      // Single-thread view.
      document.getElementById('thread-section').hidden = false;
      document.getElementById('threads-section').hidden = true;

      async function refresh() {
        const r = await callSkill('getChatThread', { threadId });
        const ul = document.getElementById('thread');
        ul.innerHTML = '';
        if (!r.messages || r.messages.length === 0) {
          ul.innerHTML = '<div class="chat-empty">Nog geen berichten in dit gesprek.</div>';
          return;
        }
        for (const m of r.messages) {
          const isMine = m.source?.fromWebid === myActor;
          const div = document.createElement('div');
          div.className = `msg ${isMine ? 'mine' : 'theirs'}`;
          const who = isMine ? 'Jij' : (m.source?.fromWebid ?? '?');
          const when = new Date(m.source?.sentAt ?? m.addedAt ?? Date.now()).toLocaleTimeString();
          // Phase 39 — chat-message attachments render inline.  We
          // hand the message to renderAttachmentThumbs which expects
          // {id, source.attachments}; clicking a thumb opens the same
          // modal as on the prikbord (bytes already local).
          const thumbs = renderAttachmentThumbs(m);
          div.innerHTML = `<span class="meta-line">${escapeHtml(who)} · ${escapeHtml(when)}</span>${escapeHtml(m.text)}${thumbs}`;
          // Wire click → modal on each thumb.
          for (const thumb of div.querySelectorAll('.attachment-thumb')) {
            thumb.addEventListener('click', () => openAttachmentModal({
              itemId: thumb.dataset.itemId, attId: thumb.dataset.attId, thumb: thumb.dataset.thumb,
            }));
          }
          ul.appendChild(div);
        }
        ul.scrollTop = ul.scrollHeight;

        // Title: try to show the counterparty handle.
        const counterparty = r.messages.find((m) => m.source?.fromWebid !== myActor)?.source?.fromWebid;
        if (counterparty) {
          document.getElementById('thread-title').textContent = `Gesprek met ${counterparty}`;
        }
      }
      await refresh();
      setInterval(refresh, 2000);

      /* ── Phase 39 — chat picture picker ─────────────────── */
      let chatPicked = null;
      const chatPicker  = document.getElementById('chat-picture');
      const chatPicBox  = document.getElementById('chat-pic-preview');
      const chatPicStat = document.getElementById('chat-pic-status');
      chatPicker.addEventListener('change', async () => {
        const file = chatPicker.files?.[0];
        chatPicked = null;
        chatPicBox.innerHTML = '';
        chatPicStat.textContent = '';
        if (!file) return;
        chatPicStat.textContent = t('post_form.pictures_resizing', 'Foto verkleinen…');
        try {
          chatPicked = await resizeImage(file, CHAT_PRESET);
          const img = document.createElement('img');
          img.src = chatPicked.thumbnail;
          img.alt = '';
          img.className = 'picker-thumb';
          chatPicBox.appendChild(img);
          chatPicStat.textContent = t('post_form.pictures_ready', '{count} foto\'s klaar.').replace('{count}', 1);
        } catch (e) {
          chatPicStat.textContent = `${t('common.error', 'Fout')}: ${e?.message ?? e}`;
        }
      });

      document.getElementById('chat-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const input = document.getElementById('chat-input');
        const body  = input.value.trim();
        if (!body && !chatPicked) return;
        // Find the recipient's WebID from the thread (the other party).
        const t = await callSkill('getChatThread', { threadId });
        const other = t.messages.find((m) => m.source?.fromWebid !== myActor)?.source?.fromWebid;
        if (!other) { alert('Kan ontvanger niet vinden — wacht op het eerste bericht van de andere kant.'); return; }
        const args = { toWebid: other, threadId };
        if (body) args.body = body;
        if (chatPicked) args.attachment = chatPicked;
        const r = await callSkill('sendChatMessage', args);
        if (r.error) { alert(`Fout: ${r.error}`); return; }
        input.value = '';
        chatPicked = null;
        chatPicBox.innerHTML = '';
        chatPicStat.textContent = '';
        chatPicker.value = '';
        await refresh();
      });

      document.getElementById('reveal-btn').addEventListener('click', async () => {
        const t = await callSkill('getChatThread', { threadId });
        const other = t.messages.find((m) => m.source?.fromWebid !== myActor)?.source?.fromWebid;
        if (!other) { alert('Geen tegenpartij gevonden.'); return; }
        if (!confirm('Hiermee zie je elkaars echte naam, en de andere kant krijgt een hint om hetzelfde te doen. Doorgaan?')) return;
        const r = await callSkill('requestReveal', { peerWebid: other, threadId });
        if (r.error) { alert(`Fout: ${r.error}`); return; }
        alert('Connectie-verzoek verstuurd. Beide kanten moeten bevestigen voor wederzijdse onthulling.');
      });
    } else {
      // Thread list.
      const list = document.getElementById('thread-list');
      const r = await callSkill('listChatThreads', {});
      if (!r.threads || r.threads.length === 0) {
        // Keep the empty state.
      } else {
        list.innerHTML = '';
        for (const t of r.threads) {
          const li = document.createElement('li');
          li.className = 'item';
          li.style.cursor = 'pointer';
          li.innerHTML = `
            <div class="row">
              <div class="text"><strong>${escapeHtml(t.counterparty ?? t.lastFrom ?? '?')}</strong></div>
              <span class="ts">${new Date(t.lastSentAt).toLocaleString()}</span>
            </div>
            <div class="meta">${escapeHtml(t.lastBody ?? '')}</div>
          `;
          li.addEventListener('click', () => {
            location.href = `/chat.html?thread=${encodeURIComponent(t.threadId)}`;
          });
          list.appendChild(li);
        }
      }
    }
  </script>
</body>
</html>
