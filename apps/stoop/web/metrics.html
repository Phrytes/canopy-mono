<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title data-i18n="metrics.page_title">Stoop — Metrics</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .metrics-grid {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 0.5rem 1.25rem;
      align-items: center;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 0.9rem;
    }
    .metrics-grid .h {
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.4rem;
      font-family: var(--font-body, system-ui, sans-serif);
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .metrics-grid .count { font-variant-numeric: tabular-nums; text-align: right; }
    .metrics-grid .last  { color: var(--muted); }
    .empty-metrics {
      padding: 2rem 1rem;
      text-align: center;
      color: var(--muted);
      font-style: italic;
      background: var(--bg-soft);
      border-radius: var(--radius);
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/"               data-i18n="nav.feed">Buurt</a>
      <a href="/mine.html"      data-i18n="nav.my_posts">Mijn posts</a>
      <a href="/chat.html"      data-i18n="nav.chat">Chat</a>
      <a href="/contacts.html"  data-i18n="nav.contacts">Contacten</a>
      <a href="/metrics.html"   class="active" data-i18n="nav.metrics">Metrics</a>
      <a href="/profile.html"   data-i18n="nav.profile">Profiel</a>
      <a href="/sign-in.html"   data-i18n="nav.pod">Pod</a>
      <a href="/push.html"      data-i18n="nav.push">Push</a>
      <a href="/onboard.html"   data-i18n="nav.onboard">Onboarden</a>
      <a href="/settings.html"  data-i18n="nav.settings">Instellingen</a>
    </nav>
    <select id="group-switcher" hidden aria-label="Switch group"></select>
    <div id="actor"></div>
  </header>

  <main>
    <section>
      <h2 data-i18n="metrics.heading">Gebruiks-tellers (lokaal)</h2>
      <p class="hint" data-i18n="metrics.intro">
        Tellers van acties die deze agent in dit proces heeft gezien.
        In-memory — opnieuw nul bij herstart.  Faciliteert beta-runbook §
        "Operational metrics".
      </p>
      <div id="metrics-out"><div class="empty-metrics" data-i18n="common.loading">Aan het laden…</div></div>
      <div style="margin-top: 1rem; display: flex; gap: 0.6rem; align-items: center;">
        <button id="refresh" data-i18n="metrics.refresh">Vernieuw</button>
        <span id="captured-at" class="hint"></span>
      </div>
    </section>
  </main>

  <script type="module">
    import { callSkill, getActor, mountGroupSwitcher, initLocalisation, applyLocalisation, t } from '/app.js';

    await initLocalisation();
    applyLocalisation();
    document.title = t('metrics.page_title', 'Stoop — Metrics');

    document.getElementById('actor').textContent = await getActor();
    mountGroupSwitcher(document.getElementById('group-switcher'));

    function escapeHtml(s) {
      return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    async function refresh() {
      const out = document.getElementById('metrics-out');
      const at  = document.getElementById('captured-at');
      try {
        const r = await callSkill('getMetrics', {});
        const entries = Object.entries(r.snapshot ?? {})
          .sort((a, b) => (b[1].count ?? 0) - (a[1].count ?? 0));
        if (entries.length === 0) {
          out.innerHTML = `<div class="empty-metrics">${escapeHtml(t('metrics.empty', 'Nog geen tellers — er is nog niets gebeurd in deze sessie.'))}</div>`;
        } else {
          const headers = {
            event:  t('metrics.col_event',  'Event'),
            count:  t('metrics.col_count',  'Aantal'),
            last:   t('metrics.col_last',   'Laatste'),
          };
          let html = '<div class="metrics-grid">';
          html += `<div class="h">${escapeHtml(headers.event)}</div><div class="h count">${escapeHtml(headers.count)}</div><div class="h last">${escapeHtml(headers.last)}</div>`;
          for (const [k, v] of entries) {
            const last = v.lastAt ? new Date(v.lastAt).toLocaleString() : '—';
            html += `<div>${escapeHtml(k)}</div><div class="count">${v.count ?? 0}</div><div class="last">${escapeHtml(last)}</div>`;
          }
          html += '</div>';
          out.innerHTML = html;
        }
        at.textContent = t('metrics.snapshot_at', 'Snapshot: {ts}')
          .replace('{ts}', new Date(r.capturedAt ?? Date.now()).toLocaleString());
      } catch (err) {
        out.innerHTML = `<div class="empty-metrics">${escapeHtml(t('common.error', 'Fout'))}: ${escapeHtml(err.message ?? String(err))}</div>`;
      }
    }
    document.getElementById('refresh').addEventListener('click', refresh);
    await refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
