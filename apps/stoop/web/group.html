<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>Stoop — Groep</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .code-card {
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .code-card code {
      display: block;
      font-family: ui-monospace, Menlo, monospace;
      font-size: 1.4rem;
      letter-spacing: 0.04em;
      padding: 0.6rem 0.8rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      user-select: all;
      word-break: break-all;
    }
    .expiry-warn {
      color: var(--warn, #b91c1c);
      font-weight: 500;
    }
    .expiry-ok {
      color: var(--muted);
    }
    .redeem-card {
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/">Buurt</a>
      <a href="/mine.html">Mijn posts</a>
      <a href="/chat.html">Chat</a>
      <a href="/contacts.html">Contacten</a>
      <a href="/metrics.html">Metrics</a>
      <a href="/profile.html">Profiel</a>
      <a href="/sign-in.html">Pod</a>
      <a href="/push.html">Push</a>
      <a href="/onboard.html">Onboarden</a>
      <a href="/settings.html">Instellingen</a>
    </nav>
    <select id="group-switcher" hidden aria-label="Switch group"></select>
    <div id="actor"></div>
  </header>

  <main>
    <section>
      <h2 id="group-title">Groep</h2>

      <div id="rules-card" class="code-card">
        <h3 style="margin-top: 0;">Spelregels</h3>
        <div id="rules-body" class="hint">Aan het laden…</div>
      </div>

      <div class="code-card" id="code-card">
        <h3 style="margin-top: 0;">Membership-code</h3>
        <div id="code-status" class="hint">Aan het laden…</div>
        <code id="code-display" hidden></code>
        <p id="expiry-line" class="hint" style="margin-top: 0.6rem;"></p>

        <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.6rem;">
          <button id="copy-code" type="button" hidden>Kopieer</button>
          <button id="rotate-now" type="button" hidden>Rotate nu (admin)</button>
          <span id="action-status" class="hint"></span>
        </div>
      </div>

      <div class="redeem-card">
        <h3 style="margin-top: 0;">Heb je een code gekregen?</h3>
        <p class="hint">
          Plak hem hier om je lidmaatschap te bevestigen / verlengen.
        </p>
        <form id="redeem-form" style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
          <input id="redeem-input" type="text" required placeholder="Membership-code">
          <button type="submit">Bevestigen</button>
          <span id="redeem-status" class="hint"></span>
        </form>
      </div>
    </section>
  </main>

  <script type="module">
    import { callSkill, getActor, mountGroupSwitcher } from '/app.js';

    document.getElementById('actor').textContent = await getActor();
    mountGroupSwitcher(document.getElementById('group-switcher'));

    function escapeHtml(s) {
      return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    const groupId = new URLSearchParams(location.search).get('id')
      ?? new URLSearchParams(location.search).get('groupId');
    if (!groupId) {
      document.querySelector('main').innerHTML =
        '<section><h2>Geen groep opgegeven.</h2><p>Voeg <code>?id=&lt;groupId&gt;</code> aan de URL toe.</p></section>';
      throw new Error('no groupId');
    }
    document.getElementById('group-title').textContent = `Groep: ${groupId}`;

    /* ── Rules ─────────────────────────────────────────────── */

    async function refreshRules() {
      try {
        const r = await callSkill('getGroupRules', { groupId });
        const rules = r?.rules?.source?.rules ?? null;
        const body = document.getElementById('rules-body');
        if (!rules) { body.textContent = '— geen regels gepubliceerd —'; return; }
        body.innerHTML = `
          <p><strong>Doel:</strong> ${escapeHtml(rules.purpose ?? '—')}</p>
          ${rules.houseRules?.length ? `<ul>${rules.houseRules.map(h => `<li>${escapeHtml(h)}</li>`).join('')}</ul>` : ''}
          <p class="hint">Modus: <strong>${escapeHtml(rules.keyRotationMode ?? '?')}</strong> · code wisselt elke <strong>${rules.rotationDays ?? '?'}</strong> dagen</p>`;
      } catch (err) {
        document.getElementById('rules-body').textContent = `Fout: ${err.message ?? err}`;
      }
    }

    /* ── Code ──────────────────────────────────────────────── */

    function expiryLabel(expiresAt) {
      if (!expiresAt) return '';
      const ms = expiresAt - Date.now();
      if (ms < 0) return `<span class="expiry-warn">Verlopen op ${new Date(expiresAt).toLocaleString()}</span>`;
      const days = Math.floor(ms / 86400000);
      if (days <= 3) {
        return `<span class="expiry-warn">Verloopt over ${days} dagen — admin / leden zullen de nieuwe code doorgeven.</span>`;
      }
      return `<span class="expiry-ok">Verloopt op ${new Date(expiresAt).toLocaleString()} (over ${days} dagen)</span>`;
    }

    async function refreshCode() {
      const status   = document.getElementById('code-status');
      const display  = document.getElementById('code-display');
      const expiry   = document.getElementById('expiry-line');
      const copyBtn  = document.getElementById('copy-code');
      const rotateBtn= document.getElementById('rotate-now');

      try {
        const r = await callSkill('getCurrentMembershipCode', { groupId });
        if (r.error === 'admin-only') {
          status.innerHTML = '<em>Alleen admins kunnen de code zien in deze groep. Vraag een admin om de huidige code.</em>';
          display.hidden = true;
          copyBtn.hidden = true;
          // Probably non-admin; hide rotate-now.
          rotateBtn.hidden = true;
          return;
        }
        if (r.error === 'no-code') {
          status.innerHTML = '<em>Nog geen code gegenereerd voor deze groep.</em>';
          display.hidden = true;
          copyBtn.hidden = true;
          return;
        }
        if (r.error) {
          status.textContent = `Fout: ${r.error}`;
          return;
        }

        status.textContent = `Modus: ${r.keyRotationMode ?? '?'}`;
        display.hidden = false;
        display.textContent = r.code;
        expiry.innerHTML = expiryLabel(r.expiresAt);
        copyBtn.hidden = false;

        // Rotate button: try to call rotate (admin-only). If we get
        // 'admin-only' back, hide it. Otherwise show.
        // Cheap probe: hidden by default, revealed if a hidden no-op
        // rotate test would succeed? Skip the probe — show the button
        // and let the click handler surface the error.
        rotateBtn.hidden = false;
      } catch (err) {
        status.textContent = `Fout: ${err.message ?? err}`;
      }
    }

    document.getElementById('copy-code').addEventListener('click', async () => {
      const text = document.getElementById('code-display').textContent;
      const status = document.getElementById('action-status');
      try {
        await navigator.clipboard.writeText(text);
        status.textContent = 'Gekopieerd. Stuur de code out-of-band — niet via Stoop.';
      } catch {
        status.textContent = 'Kopiëren mislukt; selecteer + kopieer handmatig.';
      }
    });

    document.getElementById('rotate-now').addEventListener('click', async () => {
      const status = document.getElementById('action-status');
      if (!confirm('Een nieuwe code genereren? De oude blijft 24 uur geldig (grace).')) return;
      status.textContent = 'Roteren…';
      try {
        const r = await callSkill('rotateMyGroupCode', { groupId });
        if (r.error) { status.textContent = `Fout: ${r.error}`; return; }
        status.textContent = 'Nieuwe code gegenereerd.';
        await refreshCode();
      } catch (err) {
        status.textContent = `Fout: ${err.message ?? err}`;
      }
    });

    /* ── Redeem ────────────────────────────────────────────── */

    document.getElementById('redeem-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const status = document.getElementById('redeem-status');
      const code = document.getElementById('redeem-input').value.trim();
      if (!code) return;
      status.textContent = 'Bezig…';
      try {
        const r = await callSkill('redeemMembershipCode', { groupId, code });
        if (r.error) { status.textContent = `Fout: ${r.error}`; return; }
        status.textContent = `Bevestigd. Geldig tot ${new Date(r.validUntil).toLocaleString()}.`;
        document.getElementById('redeem-input').value = '';
      } catch (err) {
        status.textContent = `Fout: ${err.message ?? err}`;
      }
    });

    await Promise.all([refreshRules(), refreshCode()]);
    setInterval(refreshCode, 30_000);
  </script>
</body>
</html>
