<!doctype html>
<!--
  Tier: 3 — fully bespoke.  (See DESIGN-tier-policy.md.)
  Justification: mnemonic-restore wizard — validate phrase → show
    pubkey preview → confirm restore.  Out-of-scope per Tier C audit:
    passphrase/mnemonic flows are auth concerns, app-side.  Skills
    called (validateMnemonicPhrase, restoreFromMnemonic) are one-shot
    reveals — Q27 explicitly defers them.
-->
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title data-i18n="restore.page_title">Stoop</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .step-card {
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      margin-bottom: 1rem;
    }
    .step-card.active { border-color: var(--accent, #1d6e56); }
    .step-card.done   { opacity: 0.7; }
    .step-num {
      display: inline-block;
      width: 1.6rem; height: 1.6rem;
      border-radius: 50%;
      background: var(--accent, #1d6e56);
      color: var(--bg);
      text-align: center;
      line-height: 1.6rem;
      font-weight: 600;
      margin-right: 0.5rem;
    }
    .pubkey-preview {
      font-family: ui-monospace, Menlo, monospace;
      font-size: 0.85rem;
      word-break: break-all;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 0.5rem;
      border-radius: 4px;
    }
    .warn-box {
      background: #fef3c7;
      border: 1px solid #fcd34d;
      color: #92400e;
      padding: 0.6rem 0.9rem;
      border-radius: var(--radius);
      margin: 0.6rem 0;
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/welcome.html" data-i18n="restore.nav_back">←</a>
      <a href="/">Buurt</a>
    </nav>
  </header>

  <main>
    <section>
      <h2 data-i18n="restore.page_title">…</h2>
      <p class="hint" data-i18n="restore.intro">…</p>

      <div id="step-1" class="step-card active">
        <h3><span class="step-num">1</span><span data-i18n="restore.step1_heading">…</span></h3>
        <p class="hint" data-i18n="restore.step1_hint">…</p>
        <form id="mnemonic-form" style="display: flex; flex-direction: column; gap: 0.5rem;">
          <textarea id="mnemonic-input" rows="3" required
                    data-i18n="restore.step1_placeholder"
                    data-i18n-attr="placeholder" autocomplete="off"></textarea>
          <div style="display: flex; gap: 0.5rem; align-items: center;">
            <button type="submit" data-i18n="restore.step1_button">…</button>
            <span id="step-1-status" class="hint"></span>
          </div>
        </form>
      </div>

      <div id="step-2" class="step-card" hidden>
        <h3><span class="step-num">2</span><span data-i18n="restore.step2_heading">…</span></h3>
        <p data-i18n="restore.step2_body">…</p>
        <pre id="pubkey-display" class="pubkey-preview"></pre>
        <div class="warn-box" data-i18n="restore.step2_warning">…</div>
        <div style="display: flex; gap: 0.5rem;">
          <button id="confirm-restore" type="button" data-i18n="restore.step2_confirm">…</button>
          <button id="cancel-restore" type="button" class="ghost" data-i18n="restore.step2_cancel">…</button>
          <span id="step-2-status" class="hint"></span>
        </div>
      </div>

      <div id="step-3" class="step-card" hidden>
        <h3><span class="step-num">3</span><span data-i18n="restore.step3_heading">…</span></h3>
        <p data-i18n="restore.step3_body">…</p>
        <p class="hint" data-i18n="restore.step3_hint">…</p>
        <p style="display: flex; gap: 0.6rem; flex-wrap: wrap;">
          <a href="/sign-in.html"><button data-i18n="restore.step3_pod_button">…</button></a>
          <a href="/"><button class="ghost" data-i18n="restore.step3_home_button">…</button></a>
        </p>
      </div>
    </section>
  </main>

  <script type="module">
    import { callSkill, initI18n, applyI18n, t } from '/app.js';

    await initI18n();
    applyI18n();
    document.title = t('restore.page_title', document.title);

    const step1 = document.getElementById('step-1');
    const step2 = document.getElementById('step-2');
    const step3 = document.getElementById('step-3');
    const s1 = document.getElementById('step-1-status');
    const s2 = document.getElementById('step-2-status');
    let validatedMnemonic = null;

    document.getElementById('mnemonic-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const m = document.getElementById('mnemonic-input').value.trim();
      if (!m) return;
      s1.textContent = t('restore.step1_status_busy');
      try {
        const r = await callSkill('validateMnemonicPhrase', { mnemonic: m });
        if (r.error) { s1.textContent = `${t('common.error', 'Error')}: ${r.error}`; return; }
        s1.textContent = t('restore.step1_status_ok');
        validatedMnemonic = m;
        document.getElementById('pubkey-display').textContent = r.pubKey;
        step1.classList.remove('active');
        step1.classList.add('done');
        step2.hidden = false;
        step2.classList.add('active');
      } catch (err) {
        s1.textContent = `${t('common.error', 'Error')}: ${err.message ?? err}`;
      }
    });

    document.getElementById('confirm-restore').addEventListener('click', async () => {
      if (!validatedMnemonic) return;
      if (!confirm(t('restore.step2_confirm_prompt'))) return;
      s2.textContent = t('restore.step2_status_busy');
      try {
        const r = await callSkill('restoreFromMnemonic', {
          mnemonic: validatedMnemonic, confirm: true,
        });
        if (r.error) { s2.textContent = `${t('common.error', 'Error')}: ${r.error}`; return; }
        step2.classList.remove('active');
        step2.classList.add('done');
        step3.hidden = false;
        step3.classList.add('active');
      } catch (err) {
        s2.textContent = `${t('common.error', 'Error')}: ${err.message ?? err}`;
      }
    });

    document.getElementById('cancel-restore').addEventListener('click', () => {
      validatedMnemonic = null;
      step2.hidden = true;
      step2.classList.remove('active');
      step1.classList.add('active');
      step1.classList.remove('done');
      document.getElementById('mnemonic-input').value = '';
      s1.textContent = '';
      s2.textContent = '';
    });
  </script>
</body>
</html>
