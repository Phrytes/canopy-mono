<!doctype html>
<!--
  privacy.html — Slice E.2 (PLAN-gui-chat-uplift.md).

  Second stoop web page consuming `renderWeb(stoopManifest)`.  Picked
  as the smallest read-only page (66 lines pre-migration) — a perfect
  fit for V0.2 Q9 `view.readOnly: true`.  The first migration was
  `mine.html` (Slice E.1).

  Substrate sources of truth (V0.2):
    - `section.title`       → drives the <h2> text.
    - `section.dataSource`  → `fetchSectionItems` honours Q7
                               (`getDataLocation({})` for the data-
                               location key/value block).
    - `section.readOnly`    → page renders no Add affordance + skips
                               itemActions[] entirely (privacy is
                               truly read-only).

  ──── V0.2 substrate gaps observed (logged for follow-on slices) ────
    3. `view.dataSource.args` is STATIC.  `getPrivacyNotice` needs a
       RUNTIME `lang` arg (the browser's current language).  Worked
       around: the section's dataSource targets `getDataLocation`
       (param-free); `getPrivacyNotice` is direct-called via the
       legacy `callSkill('getPrivacyNotice', {lang})` path.  A V0.3
       extension (`dataSource.argsFromContext: {lang: '$lang'}` or
       similar) would let this be fully declarative.
    4. The section's `dataSource.skillId` (`getDataLocation`) is NOT
       a manifest op — it's a read-only info-skill outside the D.1
       "primary flows" set.  `validate.js` doesn't constrain
       skillId to `operations[].id` so this is permitted.  Worth
       flagging: a NavModel-driven page can call skills outside the
       manifest's op set.

  Page falls back to the V0 hand-built behaviour when the NavModel
  isn't reachable (legacy launchers that don't serve /navmodel.json) —
  keeps every existing launcher happy while still proving the NavModel
  path when served by `stoop-web.js`.
-->
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title data-i18n="privacy.page_title">Stoop — Privacy</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="/" data-i18n="nav.feed">Buurt</a>
      <a href="/profile.html" data-i18n="nav.profile">Profiel</a>
      <a href="/privacy.html" class="active" data-i18n="nav.privacy">Privacy</a>
    </nav>
    <div id="actor"></div>
  </header>

  <main>
    <!-- The `data-navmodel-section` attribute marks the section as
         NavModel-driven (Slice E.2).  When the NavModel is reachable,
         the inline script overwrites the heading text with
         `section.title`, fetches the data-location block via
         `fetchSectionItems` (honours `section.dataSource`), and renders
         the privacy notice via a direct callSkill (lang-aware — see
         gap #3 in the file-level comment).  When NavModel isn't
         reachable, the legacy hand-built behaviour takes over (V0
         fallback). -->
    <section id="privacy" data-navmodel-section="privacy">
      <h2 id="privacy-heading" data-i18n="privacy.heading">Privacy — wat je moet weten</h2>
      <p class="hint" data-i18n="privacy.intro">
        Stoop is een onderzoeks-preview. Onderstaande punten zijn
        nooit verstopt; ze gelden voor iedereen die meedoet.
      </p>
      <div id="notice"></div>

      <h3 style="margin-top: 2rem;" data-i18n="privacy.data_location_heading">Waar je data staat</h3>
      <ul id="data-location"></ul>
    </section>
  </main>

  <script type="module">
    import { callSkill, getActor, initI18n, applyI18n, t, currentLang } from '/app.js';
    // V0.2 (2026-05-20) — shared @canopy/web-adapter helpers.  Overlaid
    // at `/lib/web-adapter/*.js` by `bin/stoop-web.js`'s extraStaticFiles
    // (same mechanism mine.html uses).  Source-of-truth lives in
    // `packages/web-adapter/src/`.
    import { fetchSectionItems } from '/lib/web-adapter/fetchSectionItems.js';

    await initI18n();
    applyI18n();
    document.title = t('privacy.page_title', 'Stoop — Privacy');
    document.getElementById('actor').textContent = await getActor();

    // ── V0.2: consume the NavModel ───────────────────────────────────
    // Fetch `/navmodel.json` (served by `apps/stoop/bin/stoop-web.js`'s
    // `extraStaticFiles`).  When reachable, drive the heading from
    // `section.title` + the data-location fetch from
    // `section.dataSource`; when not, fall back to the V0 hand-built
    // behaviour.  `getPrivacyNotice` is direct-called either way
    // because its lang param is runtime-derived (V0.2 gap #3).
    let navSection = null;
    try {
      const res = await fetch('/navmodel.json');
      if (res.ok) {
        const nav = await res.json();
        navSection = (nav?.sections ?? []).find((s) => s.id === 'privacy') ?? null;
        if (navSection?.title) {
          document.getElementById('privacy-heading').textContent = navSection.title;
        }
      }
    } catch { /* legacy launcher: no /navmodel.json — fall through */ }

    /* ── Privacy notice (lang-aware; direct callSkill — see gap #3) ── */
    const { sections } = await callSkill('getPrivacyNotice', { lang: currentLang() });
    const wrap = document.getElementById('notice');
    for (const s of sections) {
      const h = document.createElement('h3');
      h.textContent = s.heading;
      const p = document.createElement('p');
      p.textContent = s.body;
      wrap.appendChild(h); wrap.appendChild(p);
    }

    /* ── Data location (V0.2: via fetchSectionItems when NavModel is
         reachable; direct callSkill on the legacy fallback path) ───── */
    let loc;
    if (navSection) {
      // V0.2 — `fetchSectionItems` honours `section.dataSource` (Q7).
      // For `privacy`, the manifest declares
      // `dataSource: {skillId: 'getDataLocation'}` so this dispatches
      // `callSkill('getDataLocation', {})` — replacing the prior
      // direct call at this site.
      loc = await fetchSectionItems(navSection, { callSkill });
    } else {
      // V0 fallback for legacy launchers that don't serve
      // /navmodel.json.  Calls getDataLocation directly with the same
      // arguments fetchSectionItems would produce given a dataSource
      // declaration.
      loc = await callSkill('getDataLocation', {});
    }
    const list = document.getElementById('data-location');
    const unset = t('privacy.unset_value', '— niet ingesteld —');
    const rows = [
      [t('privacy.row_relay_operator', 'Relay-operator'), loc.relayOperator],
      [t('privacy.row_relay_url',      'Relay-server'),   loc.relayUrl],
      [t('privacy.row_pod_issuer',     'Pod-aanbieder'),  loc.podIssuer],
      [t('privacy.row_pod_root',       'Pod-locatie'),    loc.podRoot],
    ];
    for (const [k, v] of rows) {
      const li = document.createElement('li');
      li.innerHTML = `<strong>${k}:</strong> ${v ?? unset}`;
      list.appendChild(li);
    }
  </script>
</body>
</html>
