<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>canopy-chat — v0.1.4 demo</title>
    <link rel="stylesheet" href="./style.css">
    <!-- v0.7.P3b 2026-05-23 — nkn-sdk loaded from CDN.  Sets
         window.nkn (UMD global) which NknTransport reads.  CDN-
         loaded (not npm bundled) per NknTransport.js's documented
         browser path.  jsdelivr is more reliable than unpkg.
         onload/onerror callbacks let /peer-connect surface a
         specific diagnostic when the script fails. -->
    <script
      src="https://cdn.jsdelivr.net/npm/nkn-sdk@1.3.4/dist/nkn.min.js"
      onload="window.__cc_nkn_loaded = true;"
      onerror="window.__cc_nkn_load_error = 'CDN load failed';"></script>
  </head>
  <body>
    <header>
      <h1>canopy-chat</h1>
      <p class="hint">
        v0.2 demo · real <code>@canopy/core</code> agent · multi-thread
        · try <code>/help</code>
      </p>
      <p class="lang-toggle">
        Language:
        <button type="button" id="lang-en" class="lang-btn">EN</button>
        <button type="button" id="lang-nl" class="lang-btn">NL</button>
      </p>
    </header>
    <div class="cc-workspace">
      <aside id="sidebar" class="cc-sidebar" aria-label="Threads"></aside>
      <section class="cc-main">
        <header class="cc-thread-header">
          <h2 id="active-thread-name"></h2>
          <span id="active-thread-filter" class="cc-thread-header-filter"></span>
        </header>
        <main id="messages" aria-live="polite"></main>
        <form id="input-form" autocomplete="off">
          <input id="chat-input"
                 type="text"
                 aria-label="Chat input"
                 placeholder="Type a /command or text…">
          <button type="submit">Send</button>
        </form>
      </section>
      <!-- v0.7.1c — network-events log side-panel.  Hidden by default;
           /logs opens it.  Closed via the [×] button.  Filter chips
           + per-event affordances live inside. -->
      <aside id="logs-panel" class="cc-logs-panel cc-logs-closed" aria-label="Network events log" hidden></aside>
      <!-- #180 (2026-05-24) — generic side-panel for manifest ops
           that declare `surfaces.page`.  Settings, multi-step wizards
           (create-group, redeem-invite gate, restore-from-mnemonic,
           ...), contact cards, calendar week-view all share this
           surface.  Mobile maps the same kind to an RN nav screen. -->
      <aside id="page-panel" class="cc-page-panel cc-page-closed" aria-label="Page panel" hidden></aside>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
