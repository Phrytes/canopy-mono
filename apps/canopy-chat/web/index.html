<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Onderling — circles</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
      /* v2 circle launcher — minimal, additive styling (board 1B). */
      .circle-page { max-width: 520px; margin: 0 auto; padding: 18px 16px 40px; }
      .circle-page__bar { display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; }
      .circle-page__back { font-size: 13px; color: #6a6a6a; text-decoration: none; }
      .circle-page__back:hover { text-decoration: underline; }
      .circle-launcher__title { font-size: 20px; font-weight: 600; margin: 6px 0 12px; }
      .circle-launcher__list { display: flex; flex-direction: column; gap: 6px; }
      .circle-tile {
        display: block; width: 100%; text-align: left; cursor: pointer;
        padding: 12px 13px; border: 1px solid #e6e0cf; border-radius: 8px;
        background: #fbf8ed; font: inherit;
      }
      .circle-tile:hover { border-color: #c9a13a; }
      .circle-tile__name { font-size: 14px; font-weight: 600; }
      .circle-tile__meta { font-size: 11px; color: #6a6a6a; margin-top: 2px; }
      .circle-launcher__empty, .circle-launcher__loading { color: #6a6a6a; font-style: italic; padding: 10px 2px; }
      .circle-launcher__new {
        margin-top: 12px; width: 100%; cursor: pointer; font: inherit;
        padding: 10px; border: 1px dashed #d8d2c0; border-radius: 8px;
        background: transparent; color: #6a6a6a;
      }
      .circle-launcher__new:hover { color: #1a1a1a; border-color: #c9a13a; }
    </style>
  </head>
  <body>
    <div class="circle-page">
      <div class="circle-page__bar">
        <a class="circle-page__back" href="./classic.html">← classic chat shell</a>
      </div>
      <div id="circle-root"></div>
    </div>
    <script type="module" src="./v2/circleApp.js"></script>
  </body>
</html>
