<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Onderling — circles</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./v2/theme.css" />
    <link rel="stylesheet" href="./v2/circle.css" />
    <!-- SP-13.2.1 — nkn-sdk CDN.  circleApp.js bootstraps NKN at boot
         so kring chat-messages can fan out to peers.  Same script the
         classic-shell page used.  Failures fall through gracefully —
         the kring view still works locally without a peer transport. -->
    <script
      src="https://cdn.jsdelivr.net/npm/nkn-sdk@1.3.4/dist/nkn.min.js"
      onload="window.__cc_nkn_loaded = true;"
      onerror="window.__cc_nkn_load_error = 'CDN load failed';"></script>
  </head>
  <body>
    <div class="circle-page">
      <!-- SP-13.1 — no "← classic chat shell" link.  v2 §1: chat IS the
           kring view, not a separate shell. -->
      <div id="circle-root"></div>
    </div>
    <nav id="circle-tabbar" class="circle-tabbar circle-tabbar--hidden"></nav>
    <script type="module" src="./v2/circleApp.js"></script>
  </body>
</html>
