<!DOCTYPE html>
<html>
<head>
  <title>NKN Browser Chat</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    #messages { margin-top: 20px; border-top: 1px solid #ccc; padding-top: 10px; }
    input { margin: 5px; padding: 5px; }
  </style>
</head>
<body>

<h2>🛰️ NKN Browser Chat</h2>

<div>
  <b>Your address:</b>
  <div id="addr">Connecting...</div>
</div>

<div>
  <input id="dest" placeholder="Paste destination address here" size="50"/>
</div>

<div>
  <input id="msg" placeholder="Type message..." size="50"/>
  <button onclick="sendMessage()">Send</button>
</div>

<div id="messages"></div>

<script src="https://unpkg.com/nkn-sdk/dist/nkn.js"></script>
<script>
  const messagesDiv = document.getElementById("messages");

  function log(text) {
    const el = document.createElement("div");
    el.textContent = text;
    messagesDiv.appendChild(el);
  }

  const client = new nkn.Client();

  client.on('connect', () => {
    document.getElementById("addr").textContent = client.addr;
    log("✅ Connected to NKN");
  });

  client.on('message', (msg) => {
    log("📩 " + msg.src + ": " + msg.payload);
  });

  async function sendMessage() {
    const dest = document.getElementById("dest").value;
    const msg = document.getElementById("msg").value;

    if (!dest || !msg) {
      alert("Need destination + message");
      return;
    }

    try {
      await client.send(dest, msg);
      log("📤 Me: " + msg);
    } catch (e) {
      log("❌ Failed to send");
      console.error(e);
    }
  }
</script>

</body>
</html>
