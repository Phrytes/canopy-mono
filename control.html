<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0b0f;
      --surf:    #13151e;
      --surf2:   #1c1f2e;
      --border:  #252836;
      --accent:  #6c63ff;
      --green:   #22c55e;
      --red:     #ef4444;
      --yellow:  #f59e0b;
      --text:    #e2e4ed;
      --muted:   #636579;
      --r:       10px;
    }

    body { background:var(--bg); color:var(--text); font-family:system-ui,sans-serif; font-size:14px; min-height:100vh; display:flex; flex-direction:column; }

    /* Header */
    header { background:var(--surf); border-bottom:1px solid var(--border); padding:12px 20px; display:flex; align-items:center; gap:10px; flex-shrink:0; }
    header h1 { font-size:15px; font-weight:700; }
    header h1 em { color:var(--accent); font-style:normal; }
    .dot { width:8px; height:8px; border-radius:50%; background:var(--muted); flex-shrink:0; }
    .dot.ready { background:var(--green); box-shadow:0 0 6px var(--green); }
    .dot.warn  { background:var(--yellow); animation:blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    #status { font-size:12px; color:var(--muted); }
    .spacer { flex:1; }
    .addr-chip { font-family:monospace; font-size:10px; color:var(--muted); background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:3px 10px; cursor:pointer; transition:border-color .2s; }
    .addr-chip:hover { border-color:var(--accent); color:var(--text); }

    /* Layout */
    .body { display:flex; flex:1; overflow:hidden; }

    /* Sidebar */
    aside { width:270px; background:var(--surf); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; flex-shrink:0; }
    .section { padding:16px; border-bottom:1px solid var(--border); }
    .section-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.2px; color:var(--muted); margin-bottom:12px; }

    input, textarea { background:var(--bg); border:1px solid var(--border); border-radius:var(--r); color:var(--text); font-family:inherit; font-size:13px; padding:8px 12px; width:100%; outline:none; transition:border-color .2s; }
    input:focus, textarea:focus { border-color:var(--accent); }
    label { display:block; font-size:11px; color:var(--muted); margin-bottom:4px; margin-top:10px; }
    label:first-child { margin-top:0; }

    .btn { border:none; border-radius:var(--r); font-family:inherit; font-size:13px; font-weight:600; cursor:pointer; padding:9px 14px; transition:opacity .15s,transform .1s; width:100%; }
    .btn:hover { opacity:.85; } .btn:active { transform:scale(.97); }
    .primary { background:var(--accent); color:#fff; }
    .ghost { background:transparent; border:1px solid var(--border); color:var(--text); }
    .ghost:hover { border-color:var(--accent); color:var(--accent); }
    .party-btn { background:linear-gradient(135deg,#ff006e,#fb5607,#ffbe0b,#8338ec,#3a86ff); color:#fff; }

    /* Display card */
    .remote-card { background:var(--bg); border:1px solid var(--border); border-radius:var(--r); padding:12px; }
    .remote-card .name { font-weight:700; font-size:14px; margin-bottom:3px; }
    .remote-card .addr { font-family:monospace; font-size:10px; color:var(--muted); word-break:break-all; }
    .skill-tag { display:inline-block; background:rgba(108,99,255,.12); border:1px solid rgba(108,99,255,.25); color:var(--accent); border-radius:20px; padding:2px 8px; font-size:10px; margin:2px; }

    /* Log */
    #log { background:var(--bg); border:1px solid var(--border); border-radius:var(--r); padding:10px; height:150px; overflow-y:auto; font-family:monospace; font-size:11px; }
    .log-ok  { color:var(--green); } .log-err { color:var(--red); } .log-sys { color:var(--muted); } .log-out { color:var(--accent); }

    /* Main */
    main { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:16px; }

    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .card { background:var(--surf); border:1px solid var(--border); border-radius:var(--r); padding:16px; }
    .card-title { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin-bottom:14px; }

    /* Scene grid */
    .scene-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
    .scene-btn { background:var(--surf2); border:2px solid var(--border); border-radius:var(--r); color:var(--text); font-family:inherit; font-size:11px; font-weight:600; cursor:pointer; padding:10px 4px; text-align:center; transition:all .2s; display:flex; flex-direction:column; align-items:center; gap:4px; }
    .scene-btn .icon { font-size:20px; }
    .scene-btn:hover, .scene-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(108,99,255,.1); }

    /* Swatches */
    .swatch-grid { display:grid; grid-template-columns:repeat(8,1fr); gap:5px; margin-bottom:10px; }
    .swatch { padding-bottom:100%; border-radius:6px; cursor:pointer; border:2px solid transparent; transition:transform .15s,border-color .15s; }
    .swatch:hover { transform:scale(1.15); border-color:rgba(255,255,255,.5); }

    /* Themes */
    .theme-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
    .theme-btn { border:2px solid var(--border); border-radius:8px; padding:9px 4px; font-size:11px; font-weight:600; font-family:inherit; cursor:pointer; text-align:center; transition:all .2s; }
    .theme-btn:hover { border-color:rgba(255,255,255,.35); }

    input[type=range] { -webkit-appearance:none; background:var(--border); height:4px; border-radius:4px; border:none; padding:0; cursor:pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:var(--accent); cursor:pointer; }
    input[type=color] { height:38px; padding:2px; border-radius:8px; border:1px solid var(--border); background:var(--bg); cursor:pointer; width:100%; }

    .fx-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .fx-btn { background:var(--surf2); border:1px solid var(--border); border-radius:var(--r); color:var(--text); font-family:inherit; font-size:11px; font-weight:600; padding:11px; cursor:pointer; text-align:center; transition:all .15s; }
    .fx-btn .icon { font-size:18px; display:block; margin-bottom:3px; }
    .fx-btn:hover { border-color:var(--accent); color:var(--accent); }
    .fx-btn:active { transform:scale(.96); }

    /* Locked state */
    .locked { opacity:.35; pointer-events:none; transition:opacity .3s; }
    .locked.unlocked { opacity:1; pointer-events:all; }

    /* Placeholder */
    #placeholder { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; gap:14px; color:var(--muted); text-align:center; padding:40px; }
    #placeholder .icon { font-size:48px; }
    #placeholder h2 { font-size:16px; font-weight:600; color:var(--text); }
    code { background:var(--surf); padding:2px 6px; border-radius:4px; font-size:12px; }

    /* Toast */
    #toast { position:fixed; bottom:20px; right:20px; background:var(--surf); border:1px solid var(--border); border-radius:var(--r); padding:10px 16px; font-size:13px; opacity:0; transform:translateY(8px); transition:opacity .2s,transform .2s; pointer-events:none; z-index:999; }
    #toast.show { opacity:1; transform:translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="dot warn" id="my-dot"></div>
  <h1>Control <em>Agent</em></h1>
  <span id="status">Starting…</span>
  <div class="spacer"></div>
  <div class="addr-chip" id="my-addr" onclick="copyMyAddr()">—</div>
</header>

<div class="body">
  <aside>

    <div class="section">
      <div class="section-title">Connect Display</div>
      <label>Display Peer ID</label>
      <input id="display-input" placeholder="Paste display address…" />
      <div style="height:8px"></div>
      <button class="btn primary" onclick="connectDisplay()">Connect →</button>
    </div>

    <div class="section" id="display-info" style="display:none">
      <div class="section-title">Display Agent</div>
      <div class="remote-card">
        <div class="name" id="display-name">—</div>
        <div class="addr" id="display-addr">—</div>
        <div id="display-skills" style="margin-top:6px"></div>
      </div>
      <div style="height:8px"></div>
      <button class="btn ghost" style="font-size:12px" onclick="disconnectDisplay()">Disconnect</button>
    </div>

    <div class="section" style="flex:1">
      <div class="section-title">Log</div>
      <div id="log"></div>
    </div>

  </aside>

  <main>
    <!-- Controls (locked until connected) -->
    <div id="controls" class="locked" style="display:flex;flex-direction:column;gap:16px">

      <!-- Scenes -->
      <div class="card">
        <div class="card-title">🎬 Scene</div>
        <div class="scene-grid">
          <button class="scene-btn active" data-scene="particles" onclick="cmd('set_scene',{scene:'particles'});setActiveScene(this)"><span class="icon">✨</span>Particles</button>
          <button class="scene-btn" data-scene="aurora"     onclick="cmd('set_scene',{scene:'aurora'});setActiveScene(this)"><span class="icon">🌌</span>Aurora</button>
          <button class="scene-btn" data-scene="waves"      onclick="cmd('set_scene',{scene:'waves'});setActiveScene(this)"><span class="icon">🌊</span>Waves</button>
          <button class="scene-btn" data-scene="matrix"     onclick="cmd('set_scene',{scene:'matrix'});setActiveScene(this)"><span class="icon">🖥️</span>Matrix</button>
          <button class="scene-btn" data-scene="geometric"  onclick="cmd('set_scene',{scene:'geometric'});setActiveScene(this)"><span class="icon">🔷</span>Geometric</button>
          <button class="scene-btn" data-scene="fireworks"  onclick="cmd('set_scene',{scene:'fireworks'});setActiveScene(this)"><span class="icon">🎆</span>Fireworks</button>
          <button class="scene-btn" data-scene="bubbles"    onclick="cmd('set_scene',{scene:'bubbles'});setActiveScene(this)"><span class="icon">🫧</span>Bubbles</button>
          <button class="scene-btn" data-scene="none"       onclick="cmd('set_scene',{scene:'none'});setActiveScene(this)"><span class="icon">⬛</span>None</button>
        </div>
      </div>

      <div class="grid-2">

        <!-- Color -->
        <div class="card">
          <div class="card-title">🎨 Color</div>
          <div class="swatch-grid" id="swatches"></div>
          <label>Custom</label>
          <input type="color" id="color-pick" value="#6c63ff" oninput="cmd('set_color',{color:this.value})" />
        </div>

        <!-- Theme + Speed -->
        <div class="card">
          <div class="card-title">🎭 Theme</div>
          <div class="theme-grid" id="themes"></div>
          <div style="height:12px"></div>
          <div class="card-title">⚡ Speed</div>
          <input type="range" id="speed" min=".1" max="3" step=".1" value="1"
            oninput="cmd('set_speed',{value:+this.value});document.getElementById('speed-val').textContent=parseFloat(this.value).toFixed(1)" />
          <div style="text-align:right;font-size:11px;color:var(--muted);margin-top:4px">speed: <span id="speed-val">1.0</span>×</div>
        </div>

        <!-- Message -->
        <div class="card">
          <div class="card-title">💬 Message</div>
          <label>Text</label>
          <input id="msg-text" placeholder="Your message…" />
          <label>Color</label>
          <input type="color" id="msg-color" value="#ffffff" />
          <label>Duration (ms)</label>
          <input type="number" id="msg-dur" value="3000" min="500" max="15000" step="500" />
          <div style="height:8px"></div>
          <button class="btn primary" onclick="sendMessage()">Send →</button>
        </div>

        <!-- Effects -->
        <div class="card">
          <div class="card-title">💥 Effects</div>
          <div class="fx-grid">
            <button class="fx-btn" onclick="cmd('flash',{color:'#ffffff',duration:300})"><span class="icon">⚡</span>Flash White</button>
            <button class="fx-btn" onclick="cmd('flash',{color:rndColor(),duration:400})"><span class="icon">🌈</span>Flash Color</button>
            <button class="fx-btn" onclick="cmd('shake',{intensity:8,duration:400})"><span class="icon">📳</span>Shake Soft</button>
            <button class="fx-btn" onclick="cmd('shake',{intensity:25,duration:600})"><span class="icon">💢</span>Shake Hard</button>
            <button class="fx-btn" onclick="cmd('reset',{})"><span class="icon">↩️</span>Reset</button>
            <button class="fx-btn" onclick="cmd('ping',{message:'ping!'})"><span class="icon">🏓</span>Ping</button>
          </div>
          <div style="height:8px"></div>
          <button class="btn party-btn" onclick="cmd('party',{duration:8000})">🎉 PARTY MODE</button>
        </div>

      </div>
    </div>

    <!-- Placeholder shown before connection -->
    <div id="placeholder">
      <div class="icon">🛰️</div>
      <h2>No display connected</h2>
      <p>Open <code>display.html</code> in another tab,<br>copy its Peer ID and paste it in the sidebar.</p>
    </div>

  </main>
</div>

<div id="toast"></div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
// ─────────────────────────────────────────────────────────────────────────────
// PeerJS setup
// ─────────────────────────────────────────────────────────────────────────────

let peer, myAddress, displayConn = null;
const pending    = new Map();
const knownPeers = new Map();   // id → { id, label, card }

function getPeerList(excludeId) {
  const list = myAddress ? [{ id:myAddress, label:'Control Agent', card:null }] : [];
  for (const [id, entry] of knownPeers) {
    if (id !== excludeId) list.push(entry);
  }
  return list;
}

function mergePeers(peers) {
  for (const p of (peers ?? [])) {
    if (!p.id || p.id === myAddress) continue;
    if (!knownPeers.has(p.id)) {
      knownPeers.set(p.id, p);
      log('sys', `Discovered peer: ${p.label ?? p.id.slice(0,12)+'…'}`);
    }
  }
}

// Use PeerJS cloud server (0.peerjs.com). Set to a { host, path, secure } object to self-host.
const PEER_SERVER = null;
const ICE = [
  { urls:'stun:stun.l.google.com:19302' },
  { urls:'stun:stun1.l.google.com:19302' },
  { urls:'stun:stun2.l.google.com:19302' },
  { urls:'turn:openrelay.metered.ca:80',                username:'openrelayproject', credential:'openrelayproject' },
  { urls:'turn:openrelay.metered.ca:80?transport=tcp',  username:'openrelayproject', credential:'openrelayproject' },
  { urls:'turn:openrelay.metered.ca:443',               username:'openrelayproject', credential:'openrelayproject' },
  { urls:'turn:openrelay.metered.ca:443?transport=tcp', username:'openrelayproject', credential:'openrelayproject' },
];

function start() {
  peer = new Peer({ ...(PEER_SERVER ?? {}), config:{ iceServers: ICE } });

  peer.on('open', (id) => {
    myAddress = id;
    document.getElementById('my-dot').className = 'dot ready';
    document.getElementById('status').textContent = 'Ready';
    document.getElementById('my-addr').textContent = id.slice(0,8)+'…'+id.slice(-6);
    log('sys', 'Agent ready');
  });

  peer.on('error', (err) => {
    document.getElementById('status').textContent = 'Error: ' + err.type;
    log('err', err.type);
  });
}

// ── Connect to display ─────────────────────────────────────────────────────

async function connectDisplay() {
  const id = document.getElementById('display-input').value.trim();
  if (!id)          { toast('Paste the display Peer ID first'); return; }
  if (!peer?.open)  { toast('Agent not ready yet'); return; }

  log('sys', 'Connecting to display…');

  try {
    displayConn = peer.connect(id, { reliable:true, serialization:'json' });

    displayConn.on('open', () => {
      wireConn(displayConn);
      log('sys', 'Connected — requesting agent card…');
      send({ type:'agent_card_request' });
      send({ type:'peer_list_request' });
    });

    displayConn.on('error', (e) => { log('err', e.message); disconnectDisplay(); });
    displayConn.on('close', ()    => { log('sys', 'Display disconnected'); disconnectDisplay(); });

  } catch(e) { log('err', e.message); toast('Connection failed'); }
}

function wireConn(conn) {
  conn.on('data', (raw) => {
    const msg = typeof raw === 'string' ? JSON.parse(raw) : raw;
    if (msg.type === 'task_update')         handleTaskUpdate(msg.task);
    if (msg.type === 'agent_card_response') onCard(conn.peer, msg.card);
    if (msg.type === 'peer_list_request')   send({ type:'peer_list_response', peers:getPeerList(conn.peer) });
    if (msg.type === 'peer_list_response')  mergePeers(msg.peers);
  });
}

function send(msg) {
  if (!displayConn?.open) { log('err', 'Not connected'); return; }
  displayConn.send(JSON.stringify(msg));
}

function disconnectDisplay() {
  displayConn?.close();
  displayConn = null;
  document.getElementById('display-info').style.display = 'none';
  document.getElementById('controls').classList.remove('unlocked');
  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('status').textContent = 'Ready';
}

function onCard(peerId, card) {
  document.getElementById('display-info').style.display = 'block';
  document.getElementById('display-name').textContent = card.name ?? 'Display Agent';
  document.getElementById('display-addr').textContent = peerId;
  document.getElementById('display-skills').innerHTML = (card.skills??[]).map(s=>`<span class="skill-tag">${s.id}</span>`).join('');

  document.getElementById('controls').classList.add('unlocked');
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('status').textContent = `Connected → ${card.name??'Display'}`;

  toast(`✓ Connected to ${card.name??'Display Agent'}`);
  log('ok', `Card received: ${card.name}`);
}

// ─────────────────────────────────────────────────────────────────────────────
// A2A task protocol
// ─────────────────────────────────────────────────────────────────────────────

function cmd(skill, params = {}) {
  const id   = crypto.randomUUID();
  const task = { id, skill, params, state:'submitted' };

  send({ type:'task', task });
  log('out', `→ ${skill}(${JSON.stringify(params).slice(0,50)})`);

  return new Promise((resolve, reject) => {
    function startTimer() {
      return setTimeout(() => { pending.delete(id); log('err',`Timeout: ${skill}`); reject(new Error('timeout')); }, 30_000);
    }
    pending.set(id, { resolve, reject, skill, timer:startTimer(), startTimer });
  });
}

function handleTaskUpdate(task) {
  const p = pending.get(task.id);
  if (!p) return;

  if (task.state === 'working') {
    clearTimeout(p.timer); p.timer = p.startTimer();
  } else if (task.state === 'completed') {
    clearTimeout(p.timer); pending.delete(task.id);
    log('ok', `✓ ${p.skill}`);
    p.resolve(task.result);
  } else if (task.state === 'failed') {
    clearTimeout(p.timer); pending.delete(task.id);
    log('err', `✗ ${p.skill}: ${task.error}`);
    p.reject(new Error(task.error));
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// UI helpers
// ─────────────────────────────────────────────────────────────────────────────

const SWATCHES = ['#ff006e','#fb5607','#ffbe0b','#06d6a0','#3a86ff','#8338ec','#ff99c8','#00d4aa','#ffffff','#aaaaaa','#555555','#000000','#ff4d4d','#ffd166','#06d6a0','#118ab2'];
const THEMES   = [{id:'dark',label:'Dark',bg:'#0f1117',c:'#6c63ff'},{id:'neon',label:'Neon',bg:'#05000f',c:'#ff00ff'},{id:'sunset',label:'Sunset',bg:'#1a0500',c:'#ff6b35'},{id:'ocean',label:'Ocean',bg:'#000d1a',c:'#00d4aa'},{id:'forest',label:'Forest',bg:'#000d04',c:'#22c55e'}];

function buildUI() {
  const sw = document.getElementById('swatches');
  for (const color of SWATCHES) {
    const d=document.createElement('div'); d.className='swatch'; d.style.background=color; d.title=color;
    d.onclick=()=>{ document.getElementById('color-pick').value=color; cmd('set_color',{color}); };
    sw.appendChild(d);
  }
  const th = document.getElementById('themes');
  for (const t of THEMES) {
    const b=document.createElement('button'); b.className='theme-btn'; b.style.background=t.bg; b.style.color=t.c; b.style.borderColor=t.c+'44'; b.textContent=t.label;
    b.onclick=()=>cmd('set_theme',{theme:t.id}); th.appendChild(b);
  }
}

function sendMessage() {
  const text=document.getElementById('msg-text').value.trim();
  const color=document.getElementById('msg-color').value;
  const duration=parseInt(document.getElementById('msg-dur').value)||3000;
  if (!text) { toast('Type a message first'); return; }
  cmd('show_message',{text,color,duration});
}

function setActiveScene(btn) {
  document.querySelectorAll('.scene-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function rndColor() {
  return ['#ff006e','#fb5607','#ffbe0b','#8338ec','#3a86ff','#06d6a0'][Math.floor(Math.random()*6)];
}

function log(type, text) {
  const el=document.getElementById('log');
  const d=document.createElement('div'); d.className='log-'+type;
  d.textContent=`[${new Date().toLocaleTimeString()}] ${text}`; el.prepend(d);
  while (el.children.length>80) el.removeChild(el.lastChild);
}

let toastT;
function toast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2500);
}

function copyMyAddr() {
  if (!myAddress) return;
  navigator.clipboard.writeText(myAddress); toast('Address copied!');
}

buildUI();
start();
</script>
</body>
</html>
