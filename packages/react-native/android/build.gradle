/**
 * @canopy/react-native — Android native module sources.
 *
 * Provides two ReactPackage modules:
 *   - MdnsModule (mDNS/DNS-SD + TCP transport)  — com.canopy.mdns.MdnsPackage
 *   - BlePeripheralModule (BLE GATT server)      — com.canopy.ble.BlePeripheralPackage
 *
 * Built as an Android library and consumed via React Native autolinking.
 * Apps don't need to hand-edit settings.gradle or MainApplication.kt —
 * the package.json "react-native" field + this module are enough.
 */
// Library subproject — the Android Gradle plugin and the Kotlin plugin are
// both provided by the consumer (Expo/React Native rootProject), so we
// don't declare our own `buildscript { classpath ... }` block.  Trying to
// do so deadlocks when this module is autolinked by a consumer that
// itself pins kotlinVersion, because our buildscript runs before the
// consumer's rootProject.ext is populated.  See gradle evaluation order.

def safeProp = { String name, Object fallback ->
    rootProject.ext.has(name) ? rootProject.ext.get(name) : fallback
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

android {
    namespace       "com.canopy.reactnative"
    compileSdkVersion   safeProp("compileSdkVersion", 34)
    buildToolsVersion   safeProp("buildToolsVersion",  "34.0.0")

    defaultConfig {
        minSdkVersion      safeProp("minSdkVersion",    23)
        targetSdkVersion   safeProp("targetSdkVersion", 34)
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions { jvmTarget = "17" }

    sourceSets {
        main { java.srcDirs = ["src/main/java"] }
        test { java.srcDirs = ["src/test/kotlin"] }
    }

    testOptions {
        unitTests.all {
            useJUnitPlatform()
        }
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation "com.facebook.react:react-android"
    implementation "org.jetbrains.kotlin:kotlin-stdlib:${safeProp('kotlinVersion', '1.9.24')}"

    // Unit tests — pure Kotlin, no Android deps.
    testImplementation "org.junit.jupiter:junit-jupiter:5.10.2"
    testImplementation "org.jetbrains.kotlin:kotlin-test:${safeProp('kotlinVersion', '1.9.24')}"
}
