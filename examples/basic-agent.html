<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>canopy-sdk — basic agent example</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; background: #0d0f17; color: #e2e4ed; }
    h1   { font-size: 18px; color: #6c63ff; }
    h2   { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: #636579; margin-top: 28px; }
    pre  { background: #13151e; border: 1px solid #252836; border-radius: 8px; padding: 12px; font-size: 12px; overflow-x: auto; }
    input { width: 100%; background: #13151e; border: 1px solid #252836; border-radius: 8px; color: #e2e4ed; padding: 8px 12px; font-family: monospace; font-size: 13px; box-sizing: border-box; outline: none; }
    input:focus { border-color: #6c63ff; }
    button { background: #6c63ff; border: none; border-radius: 8px; color: #fff; font-size: 13px; font-weight: 600; padding: 9px 18px; cursor: pointer; margin-top: 8px; }
    button:hover { opacity: .85; }
    button.ghost { background: transparent; border: 1px solid #252836; color: #e2e4ed; }
    .row { display: flex; gap: 8px; align-items: flex-start; }
    .row input { flex: 1; }
    label { display: block; font-size: 11px; color: #636579; margin-bottom: 4px; margin-top: 14px; }
    #log { background: #13151e; border: 1px solid #252836; border-radius: 8px; padding: 10px; min-height: 160px; max-height: 340px; overflow-y: auto; font-family: monospace; font-size: 11px; line-height: 1.7; }
    .ok  { color: #22c55e; }
    .err { color: #ef4444; }
    .sys { color: #636579; }
    .addr { font-family: monospace; font-size: 11px; color: #a0a0c0; word-break: break-all; }
    .status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #636579; margin-right: 6px; }
    .status.on { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
  </style>
</head>
<body>

<h1>canopy-sdk — basic agent</h1>
<p style="font-size:13px;color:#636579">
  Creates an Agent with NKN + MQTT transports, registers an <code>echo</code> and
  <code>calculate</code> skill, then lets you invoke skills on a remote agent.
</p>

<h2><span class="status" id="dot"></span>My addresses</h2>
<div id="addresses" class="addr">connecting…</div>

<h2>Connect to peer</h2>
<div class="row">
  <input id="peer-addr" placeholder="Paste NKN or MQTT address of remote agent…" />
  <button onclick="doConnect()">Connect</button>
</div>

<h2>Invoke remote skill</h2>
<label>Target address</label>
<input id="target-addr" placeholder="Same address as above, or another peer" />
<label>Skill</label>
<div class="row">
  <input id="skill-name" placeholder="echo" value="echo" style="max-width:140px" />
  <input id="skill-params" placeholder='{"message":"hello"}' value='{"message":"hello"}' />
  <button onclick="doRequest()">Request</button>
</div>
<label>Submit as long-running task</label>
<button class="ghost" onclick="doTask()">Submit Task</button>

<h2>Log</h2>
<div id="log"></div>

<!-- CDN dependencies (globals: nkn, mqtt) -->
<script src="https://unpkg.com/nkn-sdk/dist/nkn.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script type="module">
// ── Import from the SDK ────────────────────────────────────────────────────────
import { Agent, NknTransport, MqttTransport } from '../sdk/src/index.js';

// ── Logging helper ─────────────────────────────────────────────────────────────
function log(cls, msg) {
  const el  = document.getElementById('log');
  const row = document.createElement('div');
  row.className = cls;
  row.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  el.appendChild(row);
  el.scrollTop = el.scrollHeight;
}

// ── Create transports ─────────────────────────────────────────────────────────
// Seeds / addresses are persisted in sessionStorage so they survive hot-reload.
// In a real app you'd use localStorage or a more durable store.

const nknSeed    = sessionStorage.getItem('example_nkn_seed') ?? undefined;
const mqttAddr   = sessionStorage.getItem('example_mqtt_addr') ?? undefined;

const nknTransport  = new NknTransport({ seed: nknSeed });
const mqttTransport = new MqttTransport({ address: mqttAddr });

// ── Create agent ──────────────────────────────────────────────────────────────
const agent = new Agent({
  name:       'Example Agent',
  transports: [nknTransport, mqttTransport],
  policy:     { mode: 'accept_all' },
});

// ── Register capabilities ─────────────────────────────────────────────────────
agent.capability('echo', async ({ message }) => {
  log('sys', `echo called with: "${message}"`);
  return { echo: message };
}, { description: 'Echoes a message back' });

agent.capability('calculate', async ({ a, b, op }) => {
  const ops = { add: a + b, sub: a - b, mul: a * b, div: b !== 0 ? a / b : 'div/0' };
  const result = ops[op] ?? 'unknown op';
  log('sys', `calculate: ${a} ${op} ${b} = ${result}`);
  return { result };
}, { description: 'Basic arithmetic' });

// ── Transport event logging ───────────────────────────────────────────────────
agent.on('transport:connect', ({ transport }) => {
  log('ok', `${transport.constructor.name} connected — address: ${transport.address}`);
  refreshAddresses();
});
agent.on('transport:warn',  ({ message }) => log('sys', message));
agent.on('transport:error', ({ error })   => log('err', error.message));
agent.on('peer',  ({ address, card })     => log('ok', `Peer discovered: ${card?.name ?? address}`));
agent.on('message', ({ from, payload })   => log('sys', `Message from ${from.slice(0,16)}…: ${JSON.stringify(payload)}`));

// ── Start ──────────────────────────────────────────────────────────────────────
log('sys', 'Connecting to NKN and MQTT…');
await agent.start();

// Persist for next reload
if (nknTransport.seed)    sessionStorage.setItem('example_nkn_seed',  nknTransport.seed);
if (mqttTransport.address) sessionStorage.setItem('example_mqtt_addr', mqttTransport.address);

document.getElementById('dot').className = 'status on';
refreshAddresses();
log('ok', 'Agent started');

function refreshAddresses() {
  const addrs = agent.addresses;
  document.getElementById('addresses').innerHTML = Object.entries(addrs)
    .map(([t, a]) => `<b style="color:#6c63ff">${t}</b>: ${a}`)
    .join('<br>') || 'none connected yet';
}

// ── Actions ───────────────────────────────────────────────────────────────────
window.doConnect = async () => {
  const addr = document.getElementById('peer-addr').value.trim();
  if (!addr) return;
  log('sys', `Connecting to ${addr.slice(0, 24)}…`);
  try {
    await agent.connect(addr);
    document.getElementById('target-addr').value = addr;
    log('ok', 'Agent card request sent — peer will reply if online');
  } catch (e) {
    log('err', 'Connect failed: ' + e.message);
  }
};

window.doRequest = async () => {
  const to     = document.getElementById('target-addr').value.trim();
  const skill  = document.getElementById('skill-name').value.trim() || 'echo';
  let   params = {};
  try { params = JSON.parse(document.getElementById('skill-params').value || '{}'); } catch {}
  if (!to) { log('err', 'Enter a target address'); return; }

  log('sys', `request → ${skill}(${JSON.stringify(params)}) to ${to.slice(0,20)}…`);
  try {
    const result = await agent.request(to, skill, params, { timeout: 15_000 });
    log('ok', `reply: ${JSON.stringify(result)}`);
  } catch (e) {
    log('err', e.message);
  }
};

window.doTask = async () => {
  const to     = document.getElementById('target-addr').value.trim();
  const skill  = document.getElementById('skill-name').value.trim() || 'echo';
  let   params = {};
  try { params = JSON.parse(document.getElementById('skill-params').value || '{}'); } catch {}
  if (!to) { log('err', 'Enter a target address'); return; }

  log('sys', `submitTask → ${skill}(${JSON.stringify(params)}) to ${to.slice(0,20)}…`);
  try {
    const result = await agent.submitTask(to, skill, params, { timeout: 30_000 });
    log('ok', `task result: ${JSON.stringify(result)}`);
  } catch (e) {
    log('err', e.message);
  }
};
</script>
</body>
</html>
